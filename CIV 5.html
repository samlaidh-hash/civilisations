                    ageHeader.textContent = `Age ${['I', 'II', 'III'][age - 1]}`;
                    tableau.appendChild(ageHeader);
                    
                    for (let turn = 1; turn <= 6; turn++) {
                        const cardIndex = (age - 1) * 6 + (turn - 1);
                        const card = player.tableau[cardIndex];
                        
                        const slot = document.createElement('div');
                        
                        if (card) {
                            console.log(`Player ${player.name} has card ${card.name} at tableau position ${cardIndex} (Age ${age}, Turn ${turn})`);
                            slot.className = 'card';
                            if (player.ruinedCards.has(cardIndex)) {
                                slot.classList.add('ruined');
                            }
                            if (player.tappedCards.has(cardIndex)) {
                                slot.classList.add('tapped');
                            }

                            // Highlight newly placed cards
                            if (age === this.game.state.currentAge && turn === this.game.state.currentTurn) {
                                slot.style.border = '3px solid #ffd700';
                                slot.style.boxShadow = '0 0 15px rgba(255, 215, 0, 0.5)';
                            }

                            slot.innerHTML = this.getCardHTML(card);

                            // Add activation button for cards with manual triggers
                            if (card.effect && card.effect.includes('trigger:manual')) {
                                const canActivate = !player.tappedCards.has(cardIndex) &&
                                                   !player.ruinedCards.has(cardIndex) &&
                                                   player.type === 'human'; // Only show for human players

                                const activateBtn = document.createElement('button');
                                activateBtn.className = 'card-activate-btn';
                                activateBtn.textContent = '⚡';
                                activateBtn.title = canActivate ? 'Activate this card' : 'Card is tapped or cannot be activated';
                                activateBtn.disabled = !canActivate;
                                activateBtn.onclick = (e) => {
                                    e.stopPropagation();
                                    if (canActivate) {
                                        activateManualCard(playerIndex, cardIndex);
                                    }
                                };
                                slot.appendChild(activateBtn);
                            }
                        } else {
                            slot.className = 'card-slot';
                            slot.innerHTML = `<span>Turn ${turn}</span>`;
                        }
                        slot.dataset.tableauIndex = String(cardIndex);
                        tableau.appendChild(slot);
                    }
                }
            }
            
            createCardElement(card, playerIndex, cardIndex, isInHand) {
                const cardDiv = document.createElement('div');
                cardDiv.className = 'card';
                
                // Handle PASSED cards with special styling
                if (card.name === "PASSED") {
                    cardDiv.classList.add('passed-card');
                    cardDiv.style.background = 'linear-gradient(145deg, #666, #444)';
                    cardDiv.style.color = '#ccc';
                    cardDiv.style.opacity = '0.7';
                    cardDiv.style.cursor = 'not-allowed';
                    
                    try {
                        cardDiv.innerHTML = this.getCardHTML(card);
                    } catch (error) {
                        console.error('Error creating PASSED card HTML:', error);
                        cardDiv.innerHTML = '<div class="card-name">PASSED</div><div class="card-ability">No cards available</div>';
                    }
                    return cardDiv;
                }
                
                const player = this.game.state.players[playerIndex];
                const isClickable = isInHand && 
                                  this.game.state.currentPhase === 'place' && 
                                  player &&
                                  !player.placedCard &&
                                  player.type === 'human';
                
                if (isClickable) {
                    cardDiv.classList.add('clickable');
                    cardDiv.onclick = (e) => {
                        e.stopPropagation();
                        this.game.placeCard(playerIndex, cardIndex);
                    };
                    cardDiv.style.cursor = 'pointer';
                }
                
                try {
                    cardDiv.innerHTML = this.getCardHTML(card);
                } catch (error) {
                    console.error('Error creating card HTML for', card.name, ':', error);
                    cardDiv.innerHTML = `
                        <div class="card-name">${card.name || 'Unknown Card'}</div>
                        <div class="card-ability">Error loading card</div>
                    `;
                }
                
                return cardDiv;
            }
            
            getCardHTML(card) {
                // Handle PASSED cards specially
                if (card.name === "PASSED") {
                    return `
                        <div class="card-header">
                            <div class="card-resources"></div>
                            <div class="card-cost" title="Cost">0</div>
                        </div>
                        <div class="card-name">PASSED</div>
                        <div class="card-ability">No affordable cards this turn.<br>💰 +3 Gold awarded</div>
                        <div class="card-footer">
                            <div class="card-values">
                                <div class="card-value" style="background: #ffd700; color: #000; font-size: 0.6em;">+3💰</div>
                            </div>
                            <div class="card-type-icon" title="Pass">⏸️</div>
                        </div>
                    `;
                }
                
                // Ensure card has all required properties
                const safeCard = {
                    resources: [],
                    cost: 0,
                    culture: 0,
                    military: 0,
                    type: 'e',
                    ability: '',
                    ...card
                };
                
                const resourceIcons = (safeCard.resources || []).map(r => {
                    const iconHtml = this.game.iconMapping.getResourceIcon(r);
                    const iconName = this.game.iconMapping.resourceIcons[r]?.name || r;
                    return `<div class="resource-icon resource-${r}" title="${iconName}">${iconHtml}</div>`;
                }).join('');
                
                const cultureValue = safeCard.culture > 0 ? `<div class="card-value culture" title="Culture">${safeCard.culture}</div>` : '';
                const militaryValue = safeCard.military > 0 ? `<div class="card-value military" title="Military">${safeCard.military}</div>` : '';
                
                const typeIconHtml = this.game.iconMapping.getTypeIcon(safeCard.type);
                const typeName = this.game.iconMapping.typeIcons[safeCard.type]?.name || safeCard.type;
                
                const processedAbility = this.game.iconMapping.replaceResourceNamesWithIcons(safeCard.ability || '');
                
                return `
                    <div class="card-header">
                        <div class="card-resources">${resourceIcons}</div>
                        <div class="card-cost" title="Cost">${safeCard.cost}</div>
                    </div>
                    <div class="card-name">${safeCard.name}</div>
                    <div class="card-ability">${processedAbility}</div>
                    <div class="card-footer">
                        <div class="card-values">
                            ${cultureValue}
                            ${militaryValue}
                        </div>
                        <div class="card-type-icon" title="${typeName}">${typeIconHtml}</div>
                    </div>
                `;
            }
            
            updateActionButtons() {
                const btn = document.getElementById('nextPhaseBtn');
                const phase = this.game.state.currentPhase;
                
                const buttonStates = {
                    place: {
                        text: this.getPlaceButtonText(),
                        disabled: !this.game.state.players.every(p => p.placedCard)
                    },
                    reveal: {
                        text: '🎭 Reveal Cards',
                        disabled: false
                    },
                    activate: {
                        text: '⚡ Activate Cards',
                        disabled: false
                    },
                    conquest: {
                        text: '🏆 Resolve Conquest',
                        disabled: false
                    },
                    war: {
                        text: '⚔️ Resolve Wars',
                        disabled: false
                    }
                };
                
                const state = buttonStates[phase];
                if (state && btn) {
                    btn.textContent = state.text;
                    btn.disabled = state.disabled;
                    
                    // Make button more prominent when ready
                    if (!state.disabled) {
                        btn.classList.add('next-phase-ready');
                    } else {
                        btn.classList.remove('next-phase-ready');
                    }
                    
                    console.log(`Button updated: "${state.text}", disabled: ${state.disabled}`);
                }
            }
            
            getPlaceButtonText() {
                const allPlaced = this.game.state.players.every(p => p.placedCard);
                const humanPlayersWaiting = this.game.state.players.filter(p => 
                    p.type === 'human' && !p.placedCard
                ).length;
                
                const allPlayersAI = this.game.state.players.every(player => player.type.startsWith('ai-'));
                
                console.log(`Button state: allPlaced=${allPlaced}, humansWaiting=${humanPlayersWaiting}, phase=${this.game.state.currentPhase}`);
                
                if (allPlaced) {
                    if (allPlayersAI && !this.game.state.manualControlEnabled) {
                        return '🤖 Auto-advancing to Reveal...';
                    } else {
                        return '🎯 Continue to Reveal';
                    }
                } else if (humanPlayersWaiting === 0) {
                    if (allPlayersAI) {
                        return '🤖 AI players thinking...';
                    } else {
                        return '🤖 AI players thinking...';
                    }
                } else {
                    return `⏳ Waiting for ${humanPlayersWaiting} player(s)...`;
                }
            }
            
            showNotification(message) {
                const notification = document.getElementById('notification');
                const text = document.getElementById('notificationText');
                
                text.textContent = message;
                notification.classList.add('show');
                
                if (this.notificationTimeout) {
                    clearTimeout(this.notificationTimeout);
                }
                
                this.notificationTimeout = setTimeout(() => {
                    notification.classList.remove('show');
                }, 3000);
            }
            
            showModal(title, content) {
                console.log(`showModal called with title: "${title}"`);
                
                // Pause any active timers while modal is open
                if (this.game && this.game.timerManager) {
                    this.game.timerManager.clearAllTimers();
                }
                
                const modal = document.getElementById('gameModal');
                const modalTitle = document.getElementById('modalTitle');
                const modalContent = document.getElementById('modalContent');
                
                if (!modal) {
                    console.error('Modal element not found!');
                    return;
                }
                
                if (modalTitle) modalTitle.textContent = title;
                if (modalContent) modalContent.innerHTML = content;
                
                modal.classList.remove('hidden');
                document.body.style.overflow = 'hidden';
                
                console.log('Modal should now be visible');
                
                // Add click-outside-to-close functionality
                modal.onclick = (e) => {
                    if (e.target === modal) {
                        // Only allow closing conquest/war modals by clicking the button
                        if (!title.includes('Conquest') && !title.includes('War') && !title.includes('Game Complete')) {
                            hideModal();
                        }
                    }
                };
            }
        }

        // Refresh civilization options in all player rows when expansions change
        function refreshCivilizationOptions() {
            if (!game) {
                // Initialize a temporary game engine to get base civilizations
                const tempGame = new GameEngine();
                game = tempGame;
            }
            
            // Get selected expansions
            const selectedExpansions = [];
            const expansionCheckboxes = document.querySelectorAll('#expansionSelection input[type="checkbox"]:checked');
            expansionCheckboxes.forEach(checkbox => {
                selectedExpansions.push(checkbox.value);
            });
            
            // Build civilization list (base + selected expansions)
            const civilizations = {};
            
            // Add base civilizations
            if (game && game.civilizations) {
                Object.assign(civilizations, game.civilizations);
            }
            
            // Add expansion civilizations
            selectedExpansions.forEach(expId => {
                const expansion = expansionManager.expansions.get(expId);
                if (expansion && expansion.civilizations) {
                    Object.keys(expansion.civilizations).forEach(key => {
                        const civ = expansion.civilizations[key];
                        civilizations[key] = {
                            name: civ.name,
                            gold: civ.startingGold || 0,
                            culture: civ.culture || 0,
                            military: civ.military || 0
                        };
                    });
                }
            });
            
            // Update all civilization select dropdowns
            const civilizationSelects = document.querySelectorAll('.civilization-select');
            civilizationSelects.forEach(select => {
                const currentValue = select.value;
                const options = Object.keys(civilizations).map(key => {
                    const civ = civilizations[key];
                    return `<option value="${key}">${civ.name} - ${civ.gold}💰 ${civ.culture}🔵 ${civ.military}🔴</option>`;
                }).join('');
                select.innerHTML = options;
                
                // Try to restore previous selection if it still exists
                if (civilizations[currentValue]) {
                    select.value = currentValue;
                }
            });
        }

        function startGame() {

            // Get selected expansions
            const selectedExpansions = [];
            const expansionCheckboxes = document.querySelectorAll('#expansionSelection input[type="checkbox"]:checked');
            expansionCheckboxes.forEach(checkbox => {

            });
            
            console.log('Selected expansions:', selectedExpansions);

        // Global functions for UI interactions
        /**
         * Activate a card with manual trigger ability
         */
        function activateManualCard(playerIndex, cardIndex) {
            if (!game) {
                console.error('Game instance not found!');
                return;
            }

            const player = game.state.players[playerIndex];
            if (!player) {
                console.error(`Player at index ${playerIndex} not found!`);
                return;
            }

            const card = player.tableau[cardIndex];
            if (!card) {
                console.error(`Card at index ${cardIndex} not found!`);
                return;
            }

            // The Oracle at Delphi (wildType): human gets modal to choose type
            if (player.type === 'human' && card.effect && card.effect.includes('wildType')) {
                showOracleChoiceModal(playerIndex, cardIndex);
                return;
            }

            console.log(`Attempting to activate ${card.name} for ${player.name}`);
            
            // Log manual activation
            game.uiManager.addToEffectsLog(playerIndex, `⚡ Manually activated ${card.name}`);

            // Call the effect engine to manually activate the card
            const success = game.effectEngine.manuallyActivateCard(player, cardIndex, game.state);

            if (success) {
                game.logAction('manual_ability', `⚡ ${player.name} activated ${card.name}'s ability`, {
                    player: player.name,
                    card: card.name
                });
                game.showNotification(`✨ ${player.name} activated ${card.name}!`);
                game.updatePlayerStats(player);
                game.updateDisplay();
            } else {
                game.showNotification(`❌ Cannot activate ${card.name} - check conditions!`);
            }
        }

        /**
         * Show modal for The Oracle at Delphi - choose which type this card counts as
         */
        function showOracleChoiceModal(playerIndex, cardIndex) {
            const typeLabels = {
                'a': 'Concept', 'c': 'Civic', 'e': 'Economic', 'f': 'Fortified', 'h': 'Holy',
                'i': 'Infantry', 'm': 'Mounted', 'n': 'Naval', 'p': 'Person', 'r': 'Ranged',
                't': 'Trade', 'u': 'Underworld', 'w': 'Wonder'
            };
            const types = Object.keys(typeLabels);
            const buttonsHtml = types.map(t => 
                `<button class="btn" onclick="completeOracleChoice(${playerIndex}, ${cardIndex}, '${t}'); hideModal();" style="margin: 4px;">${typeLabels[t]}</button>`
            ).join('');
            const content = `
                <div style="text-align: center; padding: 20px;">
                    <h3 style="color: #ffd700; margin-bottom: 15px;">🔮 The Oracle at Delphi</h3>
                    <p style="margin-bottom: 20px;">Choose which type this card will count as (once):</p>
                    <div style="display: flex; flex-wrap: wrap; justify-content: center; gap: 8px;">
                        ${buttonsHtml}
                    </div>
                    <p style="margin-top: 20px; font-size: 0.9em; opacity: 0.8;">This card will count as your chosen type for the next condition check (e.g. hasType, countType), then tap.</p>
                    <p style="margin-top: 12px;"><button class="btn" onclick="hideModal()" style="opacity: 0.7;">Cancel</button></p>
                </div>
            `;
            game.showModal('🔮 Choose Card Type', content);
        }

        /**
         * Complete The Oracle at Delphi activation after user chooses type
         */
        function completeOracleChoice(playerIndex, cardIndex, chosenType) {
            if (!game) return;
            const player = game.state.players[playerIndex];
            if (!player || !player.tableau[cardIndex]) return;
            const card = player.tableau[cardIndex];
            player.wildTypeActive = { cardIndex, type: chosenType };
            // Card taps when consumed by a hasType/countType check, not immediately
            game.updatePlayerStats(player);
            game.updateDisplay();
            const typeLabels = { 'a':'Concept','c':'Civic','e':'Economic','f':'Fortified','h':'Holy','i':'Infantry','m':'Mounted','n':'Naval','p':'Person','r':'Ranged','t':'Trade','u':'Underworld','w':'Wonder' };
            game.showNotification(`✨ ${player.name}'s ${card.name} will count as ${typeLabels[chosenType] || chosenType}!`);
            game.logAction('manual_ability', `⚡ ${player.name} activated ${card.name} (chose ${typeLabels[chosenType]})`, { player: player.name, card: card.name });
            game.uiManager.addToEffectsLog(playerIndex, `⚡ ${card.name} counts as ${typeLabels[chosenType]}`);
        }

        function nextPhase() {
            console.log('=== NEXT PHASE BUTTON CLICKED ===');

            if (!game) {
                console.error('Game instance not found!');
                return;
            }
            
            console.log(`Current state: Age ${game.state.currentAge}, Turn ${game.state.currentTurn}, Phase ${game.state.currentPhase}`);
            
            const allPlayersPlaced = game.state.players.every(p => p.placedCard);
            console.log(`All players placed cards: ${allPlayersPlaced}`);
            
            // Special handling for conquest and war phases
            if (game.state.currentPhase === 'conquest') {
                console.log('Conquest button clicked - calling nextPhase()');
            } else if (game.state.currentPhase === 'war') {
                console.log('War button clicked - calling nextPhase()');
            }
            
            try {
                game.nextPhase();
            } catch (error) {
                console.error('Error calling nextPhase:', error);
            }
        }
        
        function manualPass(playerIndex) {
            if (game && game.manualPass) {
                game.manualPass(playerIndex);
            }
        }
        
        function advanceFromConquest() {
            console.log('Global advanceFromConquest called');
            if (window.game && window.game.advanceFromConquest) {
                console.log('Calling game.advanceFromConquest()');
                window.game.advanceFromConquest();
            } else {
                console.error('Game not accessible or method not found');
                console.log('window.game:', window.game);
            }
        }
        
        function advanceFromWar() {
            console.log('Global advanceFromWar called');
            if (window.game && window.game.advanceFromWar) {
                console.log('Calling game.advanceFromWar()');
                window.game.advanceFromWar();
            } else {
                console.error('Game not accessible or method not found');
                console.log('window.game:', window.game);
            }
        }
        
        // Debug function for testing auto-advance
        function testAutoAdvance() {
            console.log('=== TESTING AUTO-ADVANCE ===');
            if (game && game.uiManager) {
                const phase = game.state.currentPhase;
                const allPlayersAI = game.state.players.every(player => player.type.startsWith('ai-'));
                const manualControl = game.state.manualControlEnabled;
                
                console.log(`Current phase: ${phase}`);
                console.log(`All players AI: ${allPlayersAI}`);
                console.log(`Manual control enabled: ${manualControl}`);
                console.log(`Player types:`, game.state.players.map(p => `${p.name}: ${p.type}`));
                
                // Force auto-advance check
                game.uiManager.checkAutoAdvance(phase, false);
            } else {
                console.error('Game or UI manager not available');
            }
        }
        
        // Make debug function available globally
        window.testAutoAdvance = testAutoAdvance;
        
        function showGameMenu() {
            const allPlayersAI = game.state.players.every(player => player.type.startsWith('ai-'));
            const manualControlEnabled = game.state.manualControlEnabled;
            
            let menuContent = `
                <button class="btn" onclick="hideModal()">Resume Game</button><br><br>
            `;
            
            if (allPlayersAI) {
                menuContent += `
                    <button class="btn" onclick="toggleAutoAdvance()" style="background: ${manualControlEnabled ? 'linear-gradient(145deg, #dc143c, #b22222)' : 'linear-gradient(145deg, #228b22, #32cd32)'};">
                        ${manualControlEnabled ? '🚫 Auto-Advance: OFF' : '🤖 Auto-Advance: ON'}
                    </button><br><br>
                `;
            }
            
            menuContent += `
                <button class="btn" onclick="resetGame()">New Game</button><br><br>
                <button class="btn" onclick="showGameState()">Show Game State</button>
            `;
            
            game.showModal('🎮 Game Menu', menuContent);
        }
        
        function toggleAutoAdvance() {
            if (game) {
                game.state.manualControlEnabled = !game.state.manualControlEnabled;
                const status = game.state.manualControlEnabled ? 'DISABLED' : 'ENABLED';
                game.showNotification(`🤖 Auto-advance ${status}`);
                hideModal();
                game.updateDisplay();
            }
        }
        
        function showGameHistory() {
            if (!game || !game.state.gameHistory) {
                game.showModal('📜 Game History', '<p>No history available yet. Start playing!</p>');
                return;
            }

            const history = game.getRecentHistory(20);

            if (history.length === 0) {
                game.showModal('📜 Game History', '<p>No actions recorded yet. Start the game to see history!</p>');
                return;
            }

            const historyHTML = `
                <div style="text-align: left; max-height: 400px; overflow-y: auto; line-height: 1.6;">
                    <h4 style="text-align: center; color: #ffd700; margin-bottom: 15px;">Recent Game Actions</h4>
                    ${history.map((entry, index) => {
                        const icon = entry.action === 'card_played' ? '🃏' :
                                   entry.action === 'pass' ? '⏭️' :
                                   entry.action === 'conquest' ? '🏆' :
                                   entry.action === 'war' ? '⚔️' :
                                   entry.action === 'manual_ability' ? '⚡' :
                                   entry.action === 'reactive_trigger' ? '🔗' :
                                   entry.action === 'phase_change' ? '🔄' : '📌';

                        return `
                            <div style="
                                padding: 10px;
                                margin: 8px 0;
                                background: ${index === 0 ? 'rgba(255,215,0,0.2)' : 'rgba(0,0,0,0.3)'};
                                border-left: 4px solid ${index === 0 ? '#ffd700' : '#8b4513'};
                                border-radius: 5px;
                            ">
                                <div style="font-size: 0.85em; opacity: 0.7; margin-bottom: 3px;">
                                    Age ${entry.age} • Turn ${entry.turn} • ${entry.phase}
                                </div>
                                <div style="font-size: 0.95em;">
                                    ${icon} ${entry.message}
                                </div>
                            </div>
                        `;
                    }).join('')}
                </div>
                <div style="text-align: center; margin-top: 15px;">
                    <button class="btn" onclick="hideModal()">Close</button>
                </div>
            `;

            game.showModal('📜 Game History', historyHTML);
        }

        function showHelp() {
            game.showModal('❓ How to Play', `
                <div style="text-align: left; line-height: 1.6;">
                    <strong>Game Overview:</strong><br>
                    Build your civilization through 3 ages, each with 6 turns.<br><br>
                    
                    <strong>Each Turn:</strong><br>
                    1. <strong>Place:</strong> Choose a card from your hand or pass<br>
                    2. <strong>Reveal:</strong> Pay for and play your card<br>
                    3. <strong>Activate:</strong> Use your card's abilities<br><br>
                    
                    <strong>🤖 AI-Only Games:</strong><br>
                    • Game auto-advances through place/reveal/activate phases<br>
                    • Stops at conquest/war phases for you to review results<br>
                    • Toggle auto-advance on/off in the Game Menu<br>
                    • Watch AI strategies and learn from their decisions!<br><br>
                    
                    <strong>Passing:</strong><br>
                    • Click the <strong>PASS</strong> button to skip placing a card<br>
                    • Passing gives you <strong>3 gold</strong> immediately<br>
                    • Strategic when saving for expensive cards<br>
                    • Automatic if you can't afford any cards<br><br>
                    
                    <strong>End of Each Age:</strong><br>
                    • <strong>Conquest:</strong> Highest military gets culture<br>
                    • <strong>War:</strong> Players can attack each other<br><br>
                    
                    <strong>Card Features:</strong><br>
                    • <strong>Resources</strong> (top-left icons): Reduce card costs<br>
                    • <strong>Cost</strong> (top-right gold circle): Gold needed to play<br>
                    • <strong>Culture/Military</strong> (bottom-left circles): Victory points/combat<br>
                    • <strong>Type</strong> (bottom-right icon): Card category<br><br>
                    
                    <strong>Resources & Types:</strong><br>
                    Animals, Food, Knowledge, Metal, Stone, Valuables, Wood<br>
                    Economic, Military, Civic, Wonder, and more categories<br><br>
                    
                    <strong>Winning:</strong><br>
                    Most culture points at the end of Age III wins!<br>
                    Remaining gold converts to culture (3 gold = 1 culture)<br><br>
                    
                    <strong>Tips:</strong><br>
                    • Hover over cards for a larger view<br>
                    • Build resources early to reduce costs later<br>
                    • Balance military for conquest and culture for victory<br>
                    • Pass when saving gold for expensive cards<br>
                    • Watch the countdown timers - make decisions before time runs out!<br>
                    • AI difficulty affects both intelligence and thinking speed<br>
                    • Use AI-only games to learn different strategies
                </div>
                <br>
                <button class="btn" onclick="hideModal()">Got it!</button>
            `);
        }
        
        function showGameState() {
            const state = game.state;
            const playerStats = state.players.map(p => 
                `${p.name}: ${p.gold}💰 ${p.totalCulture}🏛️ ${p.totalMilitary}⚔️`
            ).join('<br>');
            
            game.showModal('📊 Game State', `
                <div style="text-align: left;">
                    <strong>Age ${state.currentAge}, Turn ${state.currentTurn}</strong><br>
                    <strong>Phase:</strong> ${state.currentPhase}<br><br>
                    <strong>Players:</strong><br>
                    ${playerStats}
                </div>
                <br>
                <button class="btn" onclick="hideModal()">Close</button>
            `);
        }
        
        function hideModal() {
            console.log('hideModal called');
            const modal = document.getElementById('gameModal');
            if (modal) {
                modal.classList.add('hidden');
                document.body.style.overflow = '';
                console.log('Modal hidden');
            } else {
                console.error('Modal element not found when trying to hide');
            }
            
            // Force a display update after closing modal
            if (game && game.updateDisplay) {
                game.updateDisplay();
            }
        }
        
        function resetGame() {
            location.reload();
        }
        
        // Enhanced modal handling with keyboard support
        document.addEventListener('DOMContentLoaded', function() {
            const modal = document.getElementById('gameModal');
            if (modal) {
                modal.addEventListener('click', function(e) {
                    if (e.target === modal) {
                        hideModal();
                    }
                });
            }
            
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') {
                    const modal = document.getElementById('gameModal');
                    if (modal && !modal.classList.contains('hidden')) {
                        hideModal();
                    }
                }
            });
        });
        
        // Initialize the game setup
        initializeSetup();
    </script>
</body>
</html>
