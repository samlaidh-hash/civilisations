                        description: "Gain 8 at the start of each Age"
                    },
                    celts: { 
                        name: "The Celts", startingGold: 7, culture: 2, military: 1, icon: 'T',
                        description: "Gain 7 at the start of each Age"
                    },
                    carthage: { 
                        name: "Carthage", startingGold: 9, culture: 1, military: 0, icon: 'C',
                        description: "Gain 9 at the start of each Age"
                    }
                };
            }
            
            /**
             * Add civilizations from an expansion
             * @param {Object} expansionCivs - Civilizations object
             */
            addExpansionCivilizations(expansionCivs) {
                Object.keys(expansionCivs).forEach(key => {
                    this.civilizations[key] = expansionCivs[key];
                });
            }
            
            createPlayer(name, type, civilizationKey) {
                const civilization = { ...this.civilizations[civilizationKey] };
                const player = {
                    id: this.state.players.length,
                    name: name,
                    type: type,
                    civilization: civilization,
                    civilizationKey: civilizationKey,
                    gold: civilization.startingGold,
                    baseCulture: civilization.culture,
                    baseMilitary: civilization.military,
                    totalCulture: civilization.culture,
                    totalMilitary: civilization.military,
                    hand: [],
                    tableau: Array(18).fill(null),
                    placedCard: null,
                    resources: new Set(),
                    tappedCards: new Set(),
                    ruinedCards: new Set()
                };
                
                this.state.players.push(player);
                return player;
            }
            
            startGame() {
                console.log('=== STARTING GAME ===');
                this.state.gameStarted = true;
                this.state.currentAge = 1;
                this.state.currentTurn = 1;
                this.state.currentPhase = 'place';
                
                this.state.settings.aiThinkingTime = parseInt(document.getElementById('aiThinkingTime')?.value || 5);
                this.state.settings.humanThinkingTime = parseInt(document.getElementById('humanThinkingTime')?.value || 60);
                
                console.log(`Game settings: AI=${this.state.settings.aiThinkingTime}s, Human=${this.state.settings.humanThinkingTime}s`);
                
                this.cardDatabase.generateDecks();
                this.dealAge(1);
                
                console.log('Players created:');
                this.state.players.forEach((player, index) => {
                    console.log(`  ${index}: ${player.name} (${player.type}) - ${player.hand.length} cards, ${player.gold} gold`);
                });
                
                this.updateDisplay();
                
                // Check if all players are AI and show special message
                const allPlayersAI = this.state.players.every(player => player.type.startsWith('ai-'));
                if (allPlayersAI) {
                    this.showNotification(`🤖 AI-only game detected! Auto-advancing through phases. Will pause at conquest/war for your review. Toggle in Menu.`);
                } else {
                    this.showNotification(`🏛️ Game started! Age ${this.state.currentAge}, Turn ${this.state.currentTurn}`);
                }
                
                console.log('Game started, current phase:', this.state.currentPhase);
                
                // Immediately start the place phase
                console.log('Starting place phase...');
                setTimeout(() => {
                    this.handlePlacePhase();
                }, 1000);
            }
            
            dealAge(age) {
                const cardsPerPlayer = 7;
                const cardPool = this.cardDatabase.getAgeCards(age);
                
                for (let i = cardPool.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [cardPool[i], cardPool[j]] = [cardPool[j], cardPool[i]];
                }
                
                this.state.players.forEach(player => {
                    player.hand = [];
                    for (let i = 0; i < cardsPerPlayer; i++) {
                        if (cardPool.length > 0) {
                            player.hand.push(cardPool.pop());
                        }
                    }
                });
                
                this.state.discardPiles[age] = cardPool;
            }
            
            placeCard(playerIndex, cardIndex) {
                console.log(`placeCard called: player ${playerIndex}, card ${cardIndex}`);
                
                if (this.state.currentPhase !== 'place') {
                    console.log(`Not in place phase: ${this.state.currentPhase}`);
                    return false;
                }
                
                const player = this.state.players[playerIndex];
                if (!player) {
                    console.error(`No player found at index ${playerIndex}`);
                    return false;
                }
                
                const card = player.hand[cardIndex];
                if (!card) {
                    console.error(`No card found at index ${cardIndex} for player ${player.name}`);
                    console.log(`Player hand:`, player.hand.map(c => c.name));
                    return false;
                }
                
                if (player.placedCard) {
                    console.log(`Player ${player.name} already placed a card`);
                    return false;
                }
                
                const actualCost = this.calculateCardCost(player, card);
                console.log(`Card ${card.name} costs ${actualCost}, player has ${player.gold} gold`);
                
                if (player.gold < actualCost) {
                    console.log(`Player ${player.name} cannot afford ${card.name}`);
                    this.showNotification(`${player.name} cannot afford ${card.name} (costs ${actualCost}, has ${player.gold})`);
                    return false;
                }
                
                player.placedCard = card;
                player.hand.splice(cardIndex, 1);

                this.timerManager.clearPlayerTimer(playerIndex);

                console.log(`Successfully placed ${card.name} for ${player.name}`);
                this.logAction('card_played', `${player.name} played ${card.name} (cost: ${actualCost} 💰)`, {
                    player: player.name,
                    card: card.name,
                    cost: actualCost
                });
                
                // Only log for human players (AI choices are hidden)
                if (player.type === 'human') {
                    this.uiManager.addToEffectsLog(playerIndex, `✅ Placed ${card.name} (cost: ${actualCost} gold)`);
                }
                
                this.showNotification(`✅ ${player.name} placed ${card.name} (cost: ${actualCost} gold)`);
                this.updateDisplay();
                
                if (this.state.players.every(p => p.placedCard)) {
                    console.log('All players placed cards, ready for next phase');
                    this.timerManager.clearAllTimers();
                    
                    // Check if all players are AI for auto-advance
                    const allPlayersAI = this.state.players.every(player => player.type.startsWith('ai-'));
                    console.log(`All players finished placing. All AI: ${allPlayersAI}, Manual control: ${this.state.manualControlEnabled}`);
                    
                    if (allPlayersAI && !this.state.manualControlEnabled) {
                        this.showNotification(`🤖 All AI players finished! Auto-advancing in 1 second...`);
                        console.log('Triggering immediate auto-advance for AI-only game');
                        
                        // Force auto-advance immediately for place phase
                        setTimeout(() => {
                            console.log('🚀 IMMEDIATE AUTO-ADVANCE: Calling nextPhase() now');
                            if (window.nextPhase) {
                                window.nextPhase();
                            } else {
                                console.error('window.nextPhase not found!');
                            }
                        }, 1000);
                    } else {
                        this.showNotification(`🎯 All players have placed cards! Click "Continue to Reveal" to proceed.`);
                    }
                    
                    // Update display which will trigger auto-advance check for other phases
                    this.updateDisplay();
                }
                
                return true;
            }
            
            unplaceCard(playerIndex) {
                if (this.state.currentPhase !== 'place') {
                    return false;
                }
                
                const player = this.state.players[playerIndex];
                if (!player || !player.placedCard || player.type !== 'human') {
                    return false;
                }
                
                // Don't allow unplacing PASSED cards
                if (player.placedCard.name === "PASSED") {
                    return false;
                }
                
                // Put the card back in the hand
                const card = player.placedCard;
                player.hand.push(card);
                player.placedCard = null;
                
                // Restart timer if it was cleared
                if (this.state.currentPhase === 'place' && !player.placedCard) {
                    if (player.type === 'human' && this.state.settings.humanThinkingTime > 0) {
                        this.timerManager.createTimer(playerIndex, false, () => this.makeRandomChoice(playerIndex));
                    }
                }
                
                console.log(`Unplaced ${card.name} for ${player.name}`);
                this.uiManager.addToEffectsLog(playerIndex, `↩️ Unplaced ${card.name}`);
                this.showNotification(`↩️ ${player.name} unplaced ${card.name}`);
                this.updateDisplay();
                
                return true;
            }
            
            makeRandomChoice(playerIndex) {
                console.log(`Making random choice for player ${playerIndex}`);
                
                const player = this.state.players[playerIndex];
                if (!player) {
                    console.error(`No player found at index ${playerIndex}`);
                    return;
                }
                
                if (player.placedCard) {
                    console.log(`Player ${player.name} already placed card`);
                    return;
                }
                if (this.state.currentPhase !== 'place') {
                    console.log(`Not in place phase, canceling random choice for ${player.name}`);
                    return;
                }
                
                console.log(`${player.name} has ${player.hand.length} cards, ${player.gold} gold`);
                
                const affordableCards = [];
                player.hand.forEach((card, index) => {
                    const cost = this.calculateCardCost(player, card);
                    if (cost <= player.gold) {
                        affordableCards.push({card, index});
                    }
                });
                
                console.log(`Found ${affordableCards.length} affordable cards for random choice`);
                
                // If this is an AI player and they returned -1 but have affordable cards, 
                // they chose to pass strategically
                if (player.type.startsWith('ai-') && affordableCards.length > 0) {
                    console.log(`${player.name} chose strategic pass despite having affordable cards`);
                    this.forcePlayerPass(player, playerIndex);
                } else if (affordableCards.length > 0) {
                    const randomChoice = affordableCards[Math.floor(Math.random() * affordableCards.length)];
                    console.log(`Random choice: ${randomChoice.card.name} at index ${randomChoice.index}`);
                    
                    const success = this.placeCard(playerIndex, randomChoice.index);
                    if (success) {
                        this.showNotification(`⏰ ${player.name} ran out of time! Random card selected: ${randomChoice.card.name}`);
                    } else {
                        console.error(`Failed to place random card for ${player.name}`);
                        // Force pass if even random placement fails
                        this.forcePlayerPass(player, playerIndex);
                    }
                } else {
                    // No affordable cards - force pass
                    console.log(`${player.name} has no affordable cards, forcing pass`);
                    this.forcePlayerPass(player, playerIndex);
                }
                
                // Check if all players are done after this action
                if (this.state.players.every(p => p.placedCard)) {
                    console.log('All players have placed cards (from makeRandomChoice), ready for next phase');
                    this.timerManager.clearAllTimers();
                    
                    // Check if all players are AI for auto-advance
                    const allPlayersAI = this.state.players.every(player => player.type.startsWith('ai-'));
                    console.log(`All players finished (random). All AI: ${allPlayersAI}, Manual control: ${this.state.manualControlEnabled}`);
                    
                    if (allPlayersAI && !this.state.manualControlEnabled) {
                        this.showNotification(`🤖 All AI players finished! Auto-advancing in 1 second...`);
                        console.log('Triggering immediate auto-advance for AI-only game (from random choice)');
                        
                        // Force auto-advance immediately for place phase
                        setTimeout(() => {
                            console.log('🚀 IMMEDIATE AUTO-ADVANCE (random): Calling nextPhase() now');
                            if (window.nextPhase) {
                                window.nextPhase();
                            } else {
                                console.error('window.nextPhase not found!');
                            }
                        }, 1000);
                    }
                    
                    // Update display which will trigger auto-advance check
                    this.updateDisplay();
                }
            }
            
            forcePlayerPass(player, playerIndex) {
                // Create a proper PASSED card with all required properties
                player.placedCard = {
                    name: "PASSED",
                    cost: 0,
                    culture: 0,
                    military: 0,
                    type: "p",
                    resources: [],
                    ability: "Player could not afford any cards this turn. Gains 3 gold.",
                    effect: "goldOnPass:3"
                };
                
                this.timerManager.clearPlayerTimer(playerIndex);
                
                // Check if this was a strategic pass or forced pass
                const affordableCards = player.hand.filter(card => {
                    const cost = this.calculateCardCost(player, card);
                    return cost <= player.gold;
                });
                
                if (affordableCards.length > 0) {
                    this.showNotification(`💡 ${player.name} chose to pass strategically and will receive 3 gold! 💰`);
                } else {
                    this.showNotification(`⏰ ${player.name} ran out of time and has no affordable cards! Will receive 3 gold. 💰`);
                }
                
                this.updateDisplay();
            }
            
            calculateCardCost(player, card) {
                try {
                    if (!card || !player) {
                        console.error('Invalid player or card in calculateCardCost');
                        return 999;
                    }
                    
                    let cost = card.cost || 0;
                    
                    if (card.resources && Array.isArray(card.resources) && player.resources) {
                        card.resources.forEach(resource => {
                            if (player.resources.has(resource)) {
                                cost = Math.max(0, cost - 1);
                            }
                        });
                    }
                    
                    if (player.costReductions && card.type) {
                        player.costReductions.forEach(reduction => {
                            if (reduction.includes(card.type)) {
                                cost = Math.max(0, cost - 1);
                            }
                        });
                    }
                    
                    if (player.enabledFreeCards && player.enabledFreeCards.includes(card.name)) {
                        cost = 0;
                    }
                    
                    return Math.max(0, cost);
                } catch (error) {
                    console.error('Error calculating card cost:', error.message);
                    return 999;
                }
            }

            /**
             * Get how many cost points were saved by matching resources (for Customs House trigger)
             */
            getResourceSavings(player, card) {
                if (!card || !card.resources || !Array.isArray(card.resources) || !player.resources) return 0;
                let savings = 0;
                card.resources.forEach(resource => {
                    if (player.resources.has(resource)) savings++;
                });
                return savings;
            }
            
            nextPhase() {
                console.log(`nextPhase called, current: ${this.state.currentPhase}`);
                const currentPhaseIndex = this.phases.indexOf(this.state.currentPhase);
                
                this.timerManager.clearAllTimers();
                
                // For conquest and war phases, always execute the handler when button is clicked
                // This ensures the modal is shown even if we're already in that phase
                if (this.state.currentPhase === 'conquest' || this.state.currentPhase === 'war') {
                    const handler = this.phaseHandlers[this.state.currentPhase];
                    if (handler) {
                        console.log(`Executing ${this.state.currentPhase} phase handler (button clicked)`);
                        try {
                            handler();
                        } catch (error) {
                            console.error(`Error executing ${this.state.currentPhase} handler:`, error);
                            this.showNotification(`❌ Error: ${error.message}`);
                        }
                    } else {
                        console.error(`No handler found for phase: ${this.state.currentPhase}`);
                        this.showNotification(`❌ Error: No handler for ${this.state.currentPhase} phase`);
                    }
                    return; // Modal will handle the phase advancement
                }
                
                // Always execute phase handlers first for other phases
                const handler = this.phaseHandlers[this.state.currentPhase];
                if (handler) {
                    console.log(`Executing handler for ${this.state.currentPhase}`);
                    try {
                        handler();
                    } catch (error) {
                        console.error(`Error executing ${this.state.currentPhase} handler:`, error);
                    }
                } else {
                    console.warn(`No handler found for phase: ${this.state.currentPhase}`);
                }
                
                const oldPhase = this.state.currentPhase;
                
                if (this.state.currentPhase === 'activate') {
                    if (this.state.currentTurn === 6) {
                        this.state.currentPhase = 'conquest';
                    } else {
                        this.nextTurn();
                        return;
                    }
                } else if (currentPhaseIndex < this.phases.length - 1) {
                    this.state.currentPhase = this.phases[currentPhaseIndex + 1];
                }
                
                console.log(`Phase changed: ${oldPhase} → ${this.state.currentPhase}`);
                this.showNotification(`📈 Phase: ${oldPhase} → ${this.state.currentPhase.toUpperCase()}`);
                this.updateDisplay();
                
                // Automatically trigger conquest/war phase handlers when entering those phases
                if (this.state.currentPhase === 'conquest' || this.state.currentPhase === 'war') {
                    const handler = this.phaseHandlers[this.state.currentPhase];
                    if (handler) {
                        console.log(`Auto-executing ${this.state.currentPhase} phase handler`);
                        try {
                            handler();
                        } catch (error) {
                            console.error(`Error auto-executing ${this.state.currentPhase} handler:`, error);
                            this.showNotification(`❌ Error: ${error.message}`);
                        }
                    }
                    return; // Don't continue - modal will handle advancement
                }
                
                // Check for auto-advance after phase change
                const allPlayersAI = this.state.players.every(player => player.type.startsWith('ai-'));
                if (allPlayersAI && !this.state.manualControlEnabled) {
                    if (this.state.currentPhase === 'reveal') {
                        console.log('🤖 Auto-advancing reveal phase in 2 seconds');
                        setTimeout(() => {
                            if (this.state.currentPhase === 'reveal' && !this.state.manualControlEnabled) {
                                console.log('🚀 AUTO-ADVANCE REVEAL: Calling nextPhase()');
                                if (window.nextPhase) window.nextPhase();
                            }
                        }, 2000);
                    } else if (this.state.currentPhase === 'activate') {
                        console.log('🤖 Auto-advancing activate phase in 2 seconds');
                        setTimeout(() => {
                            if (this.state.currentPhase === 'activate' && !this.state.manualControlEnabled) {
                                console.log('🚀 AUTO-ADVANCE ACTIVATE: Calling nextPhase()');
                                if (window.nextPhase) window.nextPhase();
                            }
                        }, 2000);
                    }
                }
                
                // If we just entered place phase, trigger AI
                if (this.state.currentPhase === 'place') {
                    console.log('Entered place phase, triggering AI in 500ms...');
                    setTimeout(() => {
                        this.handlePlacePhase();
                    }, 500);
                }
            }
            
            handlePlacePhase() {
                this.updateDisplay();
                
                // Immediately trigger AI for testing
                setTimeout(() => {
                    this.processAITurns();
                }, 100);
                
                // Start timers after a brief delay
                setTimeout(() => {
                    this.timerManager.startPhaseTimers();
                }, 200);
            }

            processAITurns() {
                if (this.state.currentPhase !== 'place') {
                    console.log('Not in place phase, skipping AI');
                    return;
                }
                
                const aiPlayersNeedingMoves = this.state.players.filter(player => 
                    player.type.startsWith('ai-') && !player.placedCard
                );
                
                console.log(`Found ${aiPlayersNeedingMoves.length} AI players needing moves`);
                
                if (aiPlayersNeedingMoves.length === 0) return;
                
                aiPlayersNeedingMoves.forEach((aiPlayer, aiIndex) => {
                    const playerIndex = this.state.players.indexOf(aiPlayer);
                    console.log(`Processing AI player ${aiPlayer.name} (index ${playerIndex})`);
                    
                    if (playerIndex === -1) {
                        console.error(`Could not find player index for ${aiPlayer.name}`);
                        return;
                    }
                    
                    // Use settings: AI thinks as fast as configured (Instant=200ms default for quick games)
                    const settingSeconds = this.state.settings?.aiThinkingTime ?? 0.2;
                    const thinkingTime = Math.max(150, Math.min(30000, settingSeconds * 1000)); // 150ms-30s cap
                    console.log(`AI ${aiPlayer.name} will think for ${thinkingTime}ms`);
                    
                    setTimeout(() => {
                        console.log(`AI ${aiPlayer.name} making decision now`);
                        
                        // Double-check player still needs to act
                        if (aiPlayer.placedCard) {
                            console.log(`AI ${aiPlayer.name} already placed card`);
                            return;
                        }
                        if (this.state.currentPhase !== 'place') {
                            console.log(`Phase changed, canceling AI decision for ${aiPlayer.name}`);
                            return;
                        }
                        
                        try {
                            console.log(`AI ${aiPlayer.name} has ${aiPlayer.hand.length} cards, ${aiPlayer.gold} gold`);
                            const cardChoice = this.aiManager.chooseCard(aiPlayer, this.state);
                            console.log(`AI ${aiPlayer.name} chose card index: ${cardChoice}`);
                            
                            if (cardChoice !== -1 && cardChoice < aiPlayer.hand.length) {
                                const success = this.placeCard(playerIndex, cardChoice);
                                console.log(`AI ${aiPlayer.name} placement success: ${success}`);
                                if (!success) {
                                    console.log(`Placement failed, trying random choice for ${aiPlayer.name}`);
                                    this.makeRandomChoice(playerIndex);
                                }
                            } else {
                                console.log(`Invalid choice ${cardChoice}, making random choice for ${aiPlayer.name}`);
                                this.makeRandomChoice(playerIndex);
                            }
                        } catch (error) {
                            console.error(`AI error for ${aiPlayer.name}:`, error);
                            this.makeRandomChoice(playerIndex);
                        }
                    }, thinkingTime);
                });
            }
            
            handleRevealPhase() {
                console.log('=== REVEAL PHASE ===');
                this.state.players.forEach((player, index) => {
                    if (player.placedCard) {
                        if (player.placedCard.name === "PASSED") {
                            console.log(`${player.name} passed this turn - awarding 3 gold`);
                            player.gold += 3; // Award gold for passing
                            this.uiManager.addToEffectsLog(index, `⏸️ Passed turn - gained 3 gold`);
                            player.placedCard = null;
                            this.showNotification(`${player.name} passed this turn and receives 3 gold! 💰`);
                        } else {
                            const tableauIndex = (this.state.currentAge - 1) * 6 + (this.state.currentTurn - 1);
                            const actualCost = this.calculateCardCost(player, player.placedCard);
                            const resourceSavings = this.getResourceSavings(player, player.placedCard);
                            if (resourceSavings > 0) {
                                this.effectEngine.triggerAnyResourceUsed(player, this.state);
                            }
                            
                            console.log(`Revealing ${player.placedCard.name} for ${player.name} at tableau position ${tableauIndex}`);
                            
                            player.gold -= actualCost;
                            player.gold = Math.max(0, player.gold);
                            
                            player.tableau[tableauIndex] = player.placedCard;
                            
                            // Log card reveal
                            this.uiManager.addToEffectsLog(index, `🃏 Revealed ${player.placedCard.name} (paid ${actualCost} gold)`);
                            
                            // Clear the placed card immediately so it doesn't show in hand anymore
                            player.placedCard = null;
                            
                            this.showNotification(`${player.name} revealed ${player.tableau[tableauIndex].name} (paid ${actualCost} gold)`);
                        }
                    }
                });
                
                // Force UI update
                this.updateDisplay();
                console.log('Reveal phase complete');
            }
            
            handleActivatePhase() {
                console.log('=== ACTIVATE PHASE ===');
                this.state.players.forEach((player, index) => {
                    const tableauIndex = (this.state.currentAge - 1) * 6 + (this.state.currentTurn - 1);
                    const card = player.tableau[tableauIndex];

                    if (card && !player.ruinedCards.has(tableauIndex)) {
                        console.log(`Activating ${card.name} for ${player.name}`);
                        
                        // Log card activation
                        this.uiManager.addToEffectsLog(index, `⚡ ${card.name} activated`);
                        
                        this.effectEngine.activateCard(player, card, tableauIndex, this.state);
                        this.updatePlayerStats(player);

                        // Trigger reactive effects on OTHER players' cards
                        this.effectEngine.triggerReactiveEffects(player, card, this.state);

                        if (card.effect && card.effect.includes('goldOnPlay')) {
                            const goldGain = card.effect.match(/goldOnPlay:(\d+)/);
                            if (goldGain) {
                                const message = `💰 Gained ${goldGain[1]} gold from ${card.name}`;
                                this.showNotification(`${player.name}'s ${card.name} grants ${goldGain[1]} gold!`);
                                this.uiManager.addToEffectsLog(index, message);
                            }
                        }

                        if (card.effect && card.effect.includes('resource:')) {
                            const resources = card.effect.match(/resource:([a-z])/g);
                            if (resources) {
                                const resourceNames = resources.map(r => {
                                    const code = r.split(':')[1];
                                    const names = {a:'Animals',f:'Food',k:'Knowledge',m:'Metal',s:'Stone',v:'Valuables',w:'Wood'};
                                    return names[code] || code;
                                }).join(', ');
                                const message = `📦 Gained resources: ${resourceNames}`;
                                this.showNotification(`${player.name}'s ${card.name} provides resources!`);
                                this.uiManager.addToEffectsLog(index, message);
                            }
                        }
                    }
                });

                // AI considers activating manual abilities
                this.state.players.forEach(player => {
                    if (player.type.startsWith('ai-')) {
                        this.aiManager.considerManualActivations(player);
                    }
                });

                console.log('Activate phase complete');
                this.updateDisplay();
            }
            
            handleConquestPhase() {
                try {
                    console.log('=== CONQUEST PHASE HANDLER CALLED ===');

                    // Trigger end-of-age effects for all players
                    this.state.players.forEach(player => {
                        try {
                            this.effectEngine.triggerEndOfAge(player);
                        } catch (error) {
                            console.error(`Error triggering end-of-age for ${player.name}:`, error);
                        }
                    });

                    let highestMilitary = -1;
                    let winners = [];
                    let militaryScores = [];

                    this.state.players.forEach((player, index) => {
                        militaryScores.push({name: player.name, military: player.totalMilitary, index: index});
                        console.log(`${player.name} has ${player.totalMilitary} military`);
                        if (player.totalMilitary > highestMilitary) {
                            highestMilitary = player.totalMilitary;
                            winners = [index];
                        } else if (player.totalMilitary === highestMilitary) {
                            winners.push(index);
                        }
                    });

                    const cultureReward = [0, 2, 4, 6][this.state.currentAge] || 0;
                    
                    // Sort military scores for display
                    militaryScores.sort((a, b) => b.military - a.military);

                                ${militaryScores.map((score, rank) =>

                    if (winners.length > 0 && highestMilitary > 0) {

                        const winnerNames = winners.map(i => this.state.players[i]?.name).filter(Boolean);
                        
                        if (winners.length === 1) {
                            modalContent += `
                                <div style="background: linear-gradient(145deg, rgba(255,215,0,0.3), rgba(255,215,0,0.1)); padding: 20px; border-radius: 15px; text-align: center; border: 2px solid #ffd700;">
                                    <h3 style="color: #ffd700; margin-bottom: 15px;">🏆 CONQUEST VICTOR! 🏆</h3>

                            modalContent += `
                                <div style="background: linear-gradient(145deg, rgba(255,215,0,0.3), rgba(255,215,0,0.1)); padding: 20px; border-radius: 15px; text-align: center; border: 2px solid #ffd700;">
                                    <h3 style="color: #ffd700; margin-bottom: 15px;">🤝 TIED CONQUEST! 🤝</h3>
                                    <div style="font-size: 1.2em; margin-bottom: 10px;"><strong>${winnerNames.join(' & ')}</strong></div>
                                    <div style="margin-bottom: 15px;">Share military dominance with <strong>${highestMilitary} strength each</strong></div>
                                    <div style="font-size: 1.2em; color: #4169e1;"><strong>Each gains +${cultureReward} Culture Points! 🏛️</strong></div>
                                </div>

                    } else if (highestMilitary === 0) {
                        modalContent += `
                            <div style="background: rgba(128,128,128,0.3); padding: 20px; border-radius: 15px; text-align: center; border: 2px solid #888;">
                                <h3 style="color: #888; margin-bottom: 15px;">😴 NO CONQUEST 😴</h3>
                                <div style="font-size: 1.1em;">No civilizations deployed military forces</div>
                                <div style="margin-top: 10px; opacity: 0.8;">Peace reigns across the Middle Seas...</div>
                            </div>
                        `;
                    }
                    
                    modalContent += `
                        </div>
                        <br>
                        <button class="btn" onclick="hideModal(); advanceFromConquest();" style="background: linear-gradient(145deg, #228b22, #32cd32);">⚡ Continue to War Phase</button>
                    `;
                    
                    console.log('Showing conquest modal...');
                    this.updateDisplay();
                    this.showModal('🏛️ Conquest Results', modalContent);
                    console.log('Conquest modal should now be visible');
                } catch (error) {
                    console.error('Error in handleConquestPhase:', error);
                    this.showNotification(`❌ Error in conquest phase: ${error.message}`);
                    // Still try to show a basic modal
                    try {
                        this.showModal('❌ Conquest Error', `<p>An error occurred: ${error.message}</p><button class="btn" onclick="hideModal(); advanceFromConquest();">Continue</button>`);
                    } catch (modalError) {
                        console.error('Error showing error modal:', modalError);
                    }
                }
            }
            
            handleWarPhase() {
                try {
                    console.log('=== WAR PHASE HANDLER CALLED ===');
                    
                    // Analyze player positions for potential conflicts
                    let conflicts = [];
                    let militaryGaps = [];
                    
                    this.state.players.forEach((player, index) => {
                        if (!player) {
                            console.error(`Player at index ${index} is null/undefined`);
                            return;
                        }
                        militaryGaps.push({
                            name: player.name,
                            military: player.totalMilitary,
                            culture: player.totalCulture,
                            gold: player.gold,
                            index: index
                        });
                    });
                    
                    if (militaryGaps.length === 0) {
                        console.error('No players found for war phase');
                        this.showModal('❌ War Phase Error', '<p>No players found. Cannot proceed with war phase.</p><button class="btn" onclick="hideModal(); advanceFromWar();">Continue</button>');
                        return;
                    }
                    
                    militaryGaps.sort((a, b) => b.military - a.military);
                    
                    // Check for significant military imbalances
                    const highest = militaryGaps[0];
                    const lowest = militaryGaps[militaryGaps.length - 1];
                    if (!highest || !lowest) {
                        console.error('Invalid military gaps array');
                        throw new Error('Failed to calculate military standings');
                    }
                    const militaryGap = highest.military - lowest.military;
                
                let modalContent = `
                    <div style="text-align: left; line-height: 1.8;">
                        <h4 style="color: #dc143c; text-align: center; margin-bottom: 20px;">⚔️ Age ${this.state.currentAge} War Phase ⚔️</h4>
                        
                        <div style="background: rgba(220,20,60,0.2); padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 2px solid #dc143c;">
                            <strong style="color: #dc143c;">Current Military Balance:</strong><br>
                            ${militaryGaps.map((player, rank) => 
                                `<div style="margin: 8px 0; padding: 8px; background: rgba(0,0,0,0.3); border-radius: 5px;">
                                    ${rank + 1}. <strong>${player.name}</strong>: ${player.military} ⚔️ | ${player.culture} 🏛️ | ${player.gold} 💰
                                </div>`
                            ).join('')}
                        </div>
                `;
                
                if (militaryGap >= 3) {
                    conflicts.push(`${highest.name} has overwhelming military advantage (+${militaryGap} over ${lowest.name})`);
                    modalContent += `
                        <div style="background: rgba(255,69,0,0.3); padding: 15px; border-radius: 10px; margin-bottom: 15px; border: 2px solid #ff4500;">
                            <strong style="color: #ff4500;">⚠️ MILITARY IMBALANCE DETECTED!</strong><br>
                            <div style="margin-top: 8px;">${highest.name} could potentially threaten ${lowest.name}</div>
                            <div style="font-size: 0.9em; opacity: 0.8; margin-top: 5px;">Military gap: ${militaryGap} points</div>
                        </div>
                    `;
                } else {
                    modalContent += `
                        <div style="background: rgba(34,139,34,0.3); padding: 15px; border-radius: 10px; margin-bottom: 15px; border: 2px solid #228b22;">
                            <strong style="color: #228b22;">🕊️ BALANCED FORCES</strong><br>
                            <div style="margin-top: 8px;">No major military threats detected</div>
                            <div style="font-size: 0.9em; opacity: 0.8; margin-top: 5px;">All civilizations maintain reasonable parity</div>
                        </div>
                    `;
                }
                
                    // Execute automated wars based on military imbalances
                    let warResults = [];
                    const playersInWar = new Set();

                    // Identify potential aggressors (players with significant military advantage)
                    this.state.players.forEach((attacker, attackerIndex) => {
                        try {
                            if (!attacker || attacker.totalMilitary < 3) return; // Need at least 3 military to wage war

                            // Find weakest opponent
                            let weakestOpponent = null;
                            let weakestIndex = -1;
                            let weakestMilitary = Infinity;

                            this.state.players.forEach((defender, defenderIndex) => {
                                if (defenderIndex === attackerIndex || !defender) return;
                                if (defender.totalMilitary < weakestMilitary) {
                                    weakestMilitary = defender.totalMilitary;
                                    weakestOpponent = defender;
                                    weakestIndex = defenderIndex;
                                }
                            });

                            // War threshold: attacker needs at least 2x defender's military
                            if (weakestOpponent && attacker.totalMilitary >= weakestMilitary * 2) {
                                // Trigger warDeclared effects BEFORE checking fortifications
                                // This gives the defender a chance to boost defenses
                                try {
                                    this.effectEngine.triggerWarDeclaredEffects(weakestOpponent, attacker, this.state);
                                } catch (error) {
                                    console.error(`Error triggering war declared effects:`, error);
                                }

                                // Re-calculate military after defensive triggers
                                this.updatePlayerStats(weakestOpponent);

                                // Check if defender has fortifications
                                const hasDefenderFortifications = weakestOpponent.tableau && weakestOpponent.tableau.some((card, idx) =>
                                    card && card.type === 'f' && !weakestOpponent.ruinedCards.has(idx)
                                );

                                if (hasDefenderFortifications) {
                                    warResults.push({
                                        attacker: attacker.name,
                                        defender: weakestOpponent.name,
                                        outcome: 'defended',
                                        message: `${attacker.name} attempted to attack ${weakestOpponent.name}, but fortifications held!`
                                    });
                                    playersInWar.add(attackerIndex);
                                    playersInWar.add(weakestIndex);
                                } else {
                                    // Find a random card to ruin
                                    const validTargets = [];
                                    if (weakestOpponent.tableau) {
                                        weakestOpponent.tableau.forEach((card, idx) => {
                                            if (card && !weakestOpponent.ruinedCards.has(idx)) {
                                                if (card.name === 'Masada' && weakestOpponent.tappedCards.has(idx)) return;
                                                validTargets.push(idx);
                                            }
                                        });
                                    }

                                    if (validTargets.length > 0) {
                                        const targetIdx = validTargets[Math.floor(Math.random() * validTargets.length)];
                                        const ruinedCard = weakestOpponent.tableau[targetIdx];
                                        if (!weakestOpponent.ruinedCards) {
                                            weakestOpponent.ruinedCards = new Set();
                                        }
                                        weakestOpponent.ruinedCards.add(targetIdx);
                                        this.effectEngine.triggerOwnCardRuined(weakestOpponent, targetIdx, this.state);
                                        this.effectEngine.triggerAnyCardRuined(weakestOpponent, targetIdx, this.state);

                                        // Defender loses culture
                                        const cultureLoss = 2;
                                        weakestOpponent.totalCulture = Math.max(0, weakestOpponent.totalCulture - cultureLoss);

                                        warResults.push({
                                            attacker: attacker.name,
                                            defender: weakestOpponent.name,
                                            attackerIndex: attackerIndex,
                                            defenderIndex: weakestIndex,
                                            outcome: 'success',
                                            ruinedCard: ruinedCard.name,
                                            cultureLoss: cultureLoss,
                                            message: `${attacker.name} crushed ${weakestOpponent.name}! Ruined ${ruinedCard.name} and caused ${cultureLoss} culture loss.`
                                        });
                                        playersInWar.add(attackerIndex);
                                        playersInWar.add(weakestIndex);
                                        this.effectEngine.triggerWarResult(this.state.players[attackerIndex], true, this.state);
                                        this.effectEngine.triggerWarResult(weakestOpponent, false, this.state);
                                        this.effectEngine.triggerWinConquestOrWar(this.state.players[attackerIndex], this.state);
                                        this.state.players[attackerIndex].wonWarThisPhase = true;

                                        this.logAction('war', `⚔️ ${attacker.name} attacked ${weakestOpponent.name} - Destroyed ${ruinedCard.name}`, {
                                            attacker: attacker.name,
                                            defender: weakestOpponent.name,
                                            ruinedCard: ruinedCard.name
                                        });

                                        this.updatePlayerStats(weakestOpponent);
                                    }
                                }
                            }
                        } catch (error) {
                            console.error(`Error processing war for attacker ${attackerIndex}:`, error);
                        }
                    });

                // Display war results
                if (warResults.length > 0) {
                    modalContent += `
                        <div style="background: rgba(220,20,60,0.3); padding: 20px; border-radius: 10px; margin-bottom: 15px; border: 2px solid #dc143c;">
                            <h4 style="color: #dc143c; margin-bottom: 15px;">⚔️ WAR DECLARATIONS ⚔️</h4>
                            ${warResults.map(result => `
                                <div style="background: rgba(0,0,0,0.3); padding: 12px; border-radius: 8px; margin-bottom: 10px; border-left: 4px solid ${result.outcome === 'success' ? '#dc143c' : '#ffd700'};">
                                    <strong style="color: ${result.outcome === 'success' ? '#ff6b6b' : '#ffd700'};">${result.message}</strong>
                                    ${result.outcome === 'success' ? `<br><div style="font-size: 0.9em; margin-top: 5px; opacity: 0.9;">💀 ${result.ruinedCard} destroyed | 📉 -${result.cultureLoss} culture</div>` : ''}
                                </div>
                            `).join('')}
                        </div>
                    `;
                } else {
                    modalContent += `
                        <div style="background: rgba(34,139,34,0.3); padding: 20px; border-radius: 15px; text-align: center; border: 2px solid #228b22;">
                            <h4 style="color: #228b22; margin-bottom: 10px;">🕊️ PEACEFUL AGE 🕊️</h4>
                            <div style="font-size: 1.1em;">No wars were declared this age</div>
                            <div style="font-size: 0.9em; opacity: 0.8; margin-top: 5px;">Diplomatic relations remain stable</div>
                        </div>
                    `;
                }

                modalContent += `
                    </div>
                    <br>
                `;

                // Auto-activate Mithridates for war winners (no manual click needed)
                this.effectEngine.triggerAutoMithridatesForWarWinners(this.state);

                // Peace bonus for players who didn't participate in war (Pax Romana)
                this.effectEngine.triggerWarPhasePeaceBonus(this.state, playersInWar);
                // Clear war-won flags for next phase
                this.state.players.forEach(p => { if (p) p.wonWarThisPhase = false; });

                if (this.state.currentAge === 3) {
                    modalContent += `<button class="btn" onclick="hideModal(); advanceFromWar();" style="background: linear-gradient(145deg, #ffd700, #ffed4a); color: black;">🏆 Proceed to Final Scoring</button>`;
                } else {
                    modalContent += `<button class="btn" onclick="hideModal(); advanceFromWar();" style="background: linear-gradient(145deg, #228b22, #32cd32);">🏛️ Continue to Age ${this.state.currentAge + 1}</button>`;
                }

                    console.log('Showing war modal...');
                    this.updateDisplay();
                    this.showModal('⚔️ War Phase Results', modalContent);
                    console.log('War modal should now be visible');
                } catch (error) {
                    console.error('Error in handleWarPhase:', error);
                    this.showNotification(`❌ Error in war phase: ${error.message}`);
                    // Still try to show a basic modal
                    try {
                        this.showModal('❌ War Phase Error', `<p>An error occurred: ${error.message}</p><button class="btn" onclick="hideModal(); advanceFromWar();">Continue</button>`);
                    } catch (modalError) {
                        console.error('Error showing error modal:', modalError);
                    }
                }
            }
            
            nextTurn() {
                console.log(`=== NEXT TURN: ${this.state.currentTurn} → ${this.state.currentTurn + 1} ===`);
                this.timerManager.clearAllTimers();
                this.state.currentTurn++;
                this.state.currentPhase = 'place';
                
                // Pass hands clockwise
                const hands = this.state.players.map(p => [...p.hand]);
                for (let i = 0; i < this.state.players.length; i++) {
                    const nextIndex = (i + 1) % this.state.players.length;
                    this.state.players[nextIndex].hand = hands[i];
                }
                
                this.showNotification(`🔄 Turn ${this.state.currentTurn} begins! Cards passed clockwise.`);
                console.log(`Turn ${this.state.currentTurn}, phase: ${this.state.currentPhase}`);
                this.updateDisplay();
                
                // Start the new turn's place phase
                setTimeout(() => {
                    this.handlePlacePhase();
                }, 1000);
            }
            
            nextAge() {
                console.log(`=== NEXT AGE: ${this.state.currentAge} → ${this.state.currentAge + 1} ===`);
                this.state.currentAge++;
                this.state.currentTurn = 1;
                this.state.currentPhase = 'place';

                // Add age start bonuses (reset age gold tracking for Temple of Mercury)
                this.state.players.forEach(player => {
                    player.ageStartGoldFromCards = 0;
                    // Untap all cards
                    player.tappedCards.clear();

                    // Civilization gold bonus
                    player.gold += player.civilization.startingGold;
                    console.log(`${player.name} receives ${player.civilization.startingGold} gold (age bonus)`);

                    // Trigger goldPerAge effects on cards
                    this.effectEngine.triggerAgeStart(player);
                });

                this.dealAge(this.state.currentAge);
                this.showNotification(`🏛️ Age ${this.state.currentAge} begins! New cards dealt, all cards untapped!`);
                console.log(`Age ${this.state.currentAge}, turn ${this.state.currentTurn}, phase: ${this.state.currentPhase}`);
                this.updateDisplay();

                // Start the new age's first turn
                setTimeout(() => {
                    this.handlePlacePhase();
                }, 1500);
            }
            
            advanceFromConquest() {
                console.log('=== advanceFromConquest called ===');
                console.log('Advancing from conquest to war phase');
                this.state.currentPhase = 'war';
                this.showNotification(`📈 Phase: conquest → WAR`);
                this.updateDisplay();
                
                // Small delay then show war modal
                setTimeout(() => {
                    console.log('Calling handleWarPhase...');
                    this.handleWarPhase();
                }, 500);
            }
            
            advanceFromWar() {
                console.log('=== advanceFromWar called ===');
                console.log('Advancing from war phase');
                if (this.state.currentAge === 3) {
                    this.endGame();
                } else {
                    this.nextAge();
                }
            }
            
            manualPass(playerIndex) {
                if (this.state.currentPhase !== 'place') return false;
                
                const player = this.state.players[playerIndex];
                if (!player || player.placedCard || player.type !== 'human') return false;
                
                // Create a proper PASSED card
                player.placedCard = {
                    name: "PASSED",
                    cost: 0,
                    culture: 0,
                    military: 0,
                    type: "p",
                    resources: [],
                    ability: "Player chose to pass this turn. Gains 3 gold.",
                    effect: "goldOnPass:3"
                };
                
                this.timerManager.clearPlayerTimer(playerIndex);
                this.showNotification(`💰 ${player.name} chose to pass and will receive 3 gold!`);
                this.updateDisplay();
                
                if (this.state.players.every(p => p.placedCard)) {
                    this.timerManager.clearAllTimers();
                    setTimeout(() => this.nextPhase(), 1000);
                }
                
                return true;
            }
            
            endGame() {
                console.log('=== GAME END ===');
                
                // Process end-game bonuses (Ziggurat of Ur, Expeditionary Fleet, etc.)
                this.state.players.forEach(player => {
                    if (!player || !player.tableau) return;
                    player.tableau.forEach((card, index) => {
                        if (!card || player.ruinedCards.has(index)) return;
                        if (card.effect && card.effect.includes('endGameBonus:')) {
                            const match = card.effect.match(/endGameBonus:(\d+)/);
                            if (match) {
                                const bonus = parseInt(match[1]);
                                if (!card.bonusCulture) card.bonusCulture = 0;
                                card.bonusCulture += bonus;
                                console.log(`${player.name}'s ${card.name} adds ${bonus} end-game culture!`);
                            }
                        }
                        if (card.effect && card.effect.includes('endGameGambling:')) {
                            const match = card.effect.match(/endGameGambling:(\d+):(\d+):(\d+)/);
                            if (match) {
                                const winAmount = parseInt(match[1]);
                                const loseAmount = parseInt(match[2]);
                                const winChance = parseInt(match[3]);
                                const roll = Math.floor(Math.random() * 6) + 1;
                                const goldGain = roll <= winChance ? winAmount : loseAmount;
                                player.gold += goldGain;
                                console.log(`${player.name}'s ${card.name}: rolled ${roll}, gains ${goldGain} gold!`);
                            }
                        }
                    });
                    this.updatePlayerStats(player);
                });
                
                // Convert gold to culture
                this.state.players.forEach(player => {
                    if (!player) return;
                    const goldCulture = Math.floor((player.gold || 0) / 3);
                    player.totalCulture += goldCulture;
                    
                    if (goldCulture > 0) {
                        console.log(`${player.name} converts ${player.gold} gold to ${goldCulture} culture`);
                    }
                });
                
                // Find winners
                let highestCulture = -1;
                let winners = [];
                let finalScores = [];
                
                this.state.players.forEach((player, index) => {
                    if (!player) return;
                    finalScores.push({
                        name: player.name,
                        culture: player.totalCulture,
                        military: player.totalMilitary,
                        gold: player.gold,
                        civilization: (player.civilization && player.civilization.name) || 'Unknown',
                        index: index
                    });
                    
                    if (player.totalCulture > highestCulture) {
                        highestCulture = player.totalCulture;
                        winners = [index];
                    } else if (player.totalCulture === highestCulture) {
                        winners.push(index);
                    }
                });
                
                finalScores.sort((a, b) => b.culture - a.culture);
                
                const winnerNames = winners.map(i => this.state.players[i]?.name ?? 'Unknown').filter(Boolean);
                
                let modalContent = `
                    <div style="text-align: left; line-height: 1.8;">
                        <h2 style="color: #ffd700; text-align: center; margin-bottom: 30px;">🏆 FINAL CIVILIZATION RANKINGS 🏆</h2>
                        
                        <div style="background: rgba(0,0,0,0.4); padding: 20px; border-radius: 15px; margin-bottom: 25px;">
                            ${finalScores.map((score, rank) => {
                                const isWinner = winners.includes(score.index);
                                return `
                                    <div style="
                                        margin: 10px 0; 
                                        padding: 15px; 
                                        background: ${isWinner ? 'linear-gradient(145deg, rgba(255,215,0,0.3), rgba(255,215,0,0.1))' : 'rgba(0,0,0,0.3)'}; 
                                        border-radius: 10px;
                                        border: ${isWinner ? '2px solid #ffd700' : '1px solid #8b4513'};
                                    ">
                                        <div style="display: flex; justify-content: space-between; align-items: center;">
                                            <div>
                                                <strong style="font-size: 1.2em; color: ${isWinner ? '#ffd700' : '#f4e4c1'};">
                                                    ${rank + 1}. ${score.name} ${isWinner ? '👑' : ''}
                                                </strong>
                                                <div style="font-size: 0.9em; opacity: 0.8; margin-top: 3px;">
                                                    ${score.civilization}
                                                </div>
                                            </div>
                                            <div style="text-align: right;">
                                                <div style="font-size: 1.3em; color: #4169e1;"><strong>${score.culture} 🏛️</strong></div>
                                                <div style="font-size: 0.9em; opacity: 0.8;">
                                                    ${score.military} ⚔️ | ${score.gold} 💰
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                `;
                
                if (winners.length === 1) {
                    modalContent += `
                        <div style="background: linear-gradient(145deg, rgba(255,215,0,0.4), rgba(255,215,0,0.2)); padding: 25px; border-radius: 20px; text-align: center; border: 3px solid #ffd700; margin-bottom: 20px;">
                            <h2 style="color: #ffd700; margin-bottom: 15px;">🎉 CIVILIZATION SUPREME! 🎉</h2>
                            <div style="font-size: 1.5em; margin-bottom: 10px;"><strong>${winnerNames[0]}</strong></div>
                            <div style="font-size: 1.2em; margin-bottom: 15px;">Achieves cultural dominance with</div>
                            <div style="font-size: 2em; color: #4169e1;"><strong>${highestCulture} Culture Points! 🏛️</strong></div>
                            <div style="margin-top: 15px; font-style: italic; opacity: 0.9;">
                                "Your civilization will be remembered through the ages!"
                            </div>
                        </div>
                    `;

            updatePlayerStats(player) {
                let totalCulture = player.baseCulture;
                let totalMilitary = player.baseMilitary;

                player.tableau.forEach((card, index) => {
                    if (card && !player.ruinedCards.has(index)) {
                        totalCulture += (card.culture || 0) + (card.bonusCulture || 0);
                        totalMilitary += (card.military || 0) + (card.bonusMilitary || 0);
                    }
                });

                player.totalCulture = totalCulture;
                player.totalMilitary = totalMilitary;
            }
            
            updateDisplay() {
                this.uiManager.updateGameDisplay();
            }
            
            showNotification(message) {
                this.uiManager.showNotification(message);
            }
            
            showModal(title, content) {
                this.uiManager.showModal(title, content);
            }

            /**
             * Log a game action to history
             * @param {String} action - Action type
             * @param {String} message - Human-readable message
             * @param {Object} data - Additional data
             */
            logAction(action, message, data = {}) {
                const entry = {
                    age: this.state.currentAge,
                    turn: this.state.currentTurn,
                    phase: this.state.currentPhase,
                    action,
                    message,
                    timestamp: Date.now(),
                    ...data
                };
                this.state.gameHistory.push(entry);

                // Keep history reasonable (last 100 actions)
                if (this.state.gameHistory.length > 100) {
                    this.state.gameHistory.shift();
                }

                console.log(`[HISTORY] ${message}`);
            }

            /**
             * Get recent history for display
             * @param {Number} count - Number of recent actions
             * @returns {Array} Recent history entries
             */
            getRecentHistory(count = 10) {
                return this.state.gameHistory.slice(-count).reverse();
            }
        }

                for (let i = array.length - 1; i > 0; i--) {

                    [array[i], array[j]] = [array[j], array[i]];

        // Expansion System
        /**
         * ExpansionManager - Handles loading and managing game expansions
         */
        class ExpansionManager {
            constructor() {
                this.expansions = new Map();
                this.loadedExpansions = new Set();
            }
            
            /**
             * Register an expansion module
             * @param {String} id - Unique expansion identifier
             * @param {Object} expansion - Expansion module object
             */
            registerExpansion(id, expansion) {
                if (!expansion.name || !expansion.version) {
                    console.error(`Expansion ${id} is missing required fields (name, version)`);
                    return false;
                }
                this.expansions.set(id, expansion);
                console.log(`Registered expansion: ${expansion.name} v${expansion.version}`);
                return true;
            }
            
            /**
             * Load an expansion (adds its content to the game)
             * @param {String} id - Expansion identifier
             * @param {Object} gameEngine - GameEngine instance
             * @param {Object} cardDatabase - CardDatabase instance
             */
            loadExpansion(id, gameEngine, cardDatabase) {
                const expansion = this.expansions.get(id);
                if (!expansion) {
                    console.error(`Expansion ${id} not found`);
                    return false;
                }
                
                if (this.loadedExpansions.has(id)) {
                    console.warn(`Expansion ${id} is already loaded`);
                    return false;
                }
                
                // Add civilizations
                if (expansion.civilizations && gameEngine) {
                    Object.keys(expansion.civilizations).forEach(key => {
                        gameEngine.civilizations[key] = expansion.civilizations[key];
                    });
                    console.log(`Added ${Object.keys(expansion.civilizations).length} civilizations from ${expansion.name}`);
                }
                
                // Add cards
                if (expansion.cards && cardDatabase) {
                    Object.keys(expansion.cards).forEach(age => {
                        const ageNum = parseInt(age);
                        if (cardDatabase.cards[ageNum]) {
                            cardDatabase.cards[ageNum].push(...expansion.cards[age]);
                            console.log(`Added ${expansion.cards[age].length} cards to Age ${age} from ${expansion.name}`);
                        }
                    });
                }
                
                this.loadedExpansions.add(id);
                console.log(`Loaded expansion: ${expansion.name}`);
                return true;
            }
            
            /**
             * Unload an expansion
             * @param {String} id - Expansion identifier
             */
            unloadExpansion(id) {
                this.loadedExpansions.delete(id);
                console.log(`Unloaded expansion: ${id}`);
            }
            
            /**
             * Get list of available expansions
             * @returns {Array} Array of expansion info objects
             */
            getAvailableExpansions() {
                return Array.from(this.expansions.values()).map(exp => ({
                    id: exp.id,
                    name: exp.name,
                    version: exp.version,
                    description: exp.description || '',
                    loaded: this.loadedExpansions.has(exp.id)
                }));
            }
        }
