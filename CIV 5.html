        // Effect Engine
        /**
         * EffectEngine - Comprehensive card effect processing system
         * Handles all card abilities, triggers, conditions, and state changes
         */
        class EffectEngine {
            constructor(gameEngine) {
                this.game = gameEngine;
            }

            /**
             * Activate a card's effects when it enters play
             * @param {Object} player - The player who owns the card
             * @param {Object} card - The card being activated
             * @param {Number} cardIndex - Index in the player's tableau
             * @param {Object} gameState - Current game state
             */
            activateCard(player, card, cardIndex, gameState) {
                if (!card.effect) return;

                console.log(`EffectEngine: Activating ${card.name} for ${player.name}`);

                // Parse and execute immediate effects (not triggered)
                const effects = this.parseEffectString(card.effect);

                // Execute immediate effects only (no trigger specified)
                effects.filter(e => !e.trigger).forEach(effect => {
                    this.executeEffect(player, effect, cardIndex, gameState);
                });
            }

            /**
             * Manually activate a card's ability (player choice during game)
             * @param {Object} player - The player activating
             * @param {Number} cardIndex - Index in tableau
             * @param {Object} gameState - Current game state
             * @returns {Boolean} - Success or failure
             */
            manuallyActivateCard(player, cardIndex, gameState) {
                const card = player.tableau[cardIndex];
                if (!card || !card.effect) return false;

                // Check if card is tapped
                if (player.tappedCards.has(cardIndex)) {
                    this.game.showNotification(`${card.name} is already tapped!`);
                    return false;
                }

                const effects = this.parseEffectString(card.effect);
                const manualEffects = effects.filter(e => e.trigger === 'manual');

                if (manualEffects.length === 0) return false;

                console.log(`Manual activation of ${card.name}`);

                // Check conditions
                for (let effect of manualEffects) {
                    if (effect.conditions && effect.conditions.length > 0 && !this.checkCondition(player, effect.conditions, gameState)) {
                        this.game.showNotification(`${card.name} conditions not met!`);
                        return false;
                    }
                }

                // Execute all manual effects
                let success = true;
                let tapped = false;
                manualEffects.forEach(effect => {
                    if (effect.effects) {
                        // Execute nested effects
                        effect.effects.forEach(triggerEffect => {
                            if (triggerEffect.type === 'tap') {
                                tapped = true;
                            }
                            if (!this.executeEffect(player, triggerEffect, cardIndex, gameState)) {
                                success = false;
                            }
                        });
                    } else {
                        if (effect.type === 'tap') {
                            tapped = true;
                        }
                        if (!this.executeEffect(player, effect, cardIndex, gameState)) {
                            success = false;
                        }
                    }
                });

                // Handle tapping if it was part of the executed effects
                if (tapped && success) {
                    player.tappedCards.add(cardIndex);
                    this.game.showNotification(`${card.name} activated and tapped!`);
                }

                return success;
            }

            /**
             * Parse effect string into structured effect objects
             * Format: "type:value,type:value,trigger:triggerType,condition:condType:value,effect:effectType:value"
             */
            parseEffectString(effectString) {
                // Parse more carefully to handle commas inside effect values
                // Example: "military:2,trigger:warDeclared,effect:addMilitaryToTypes:i,m,r:1,tap"
                const parts = [];
                let i = 0;
                
                while (i < effectString.length) {
                    let part = '';
                    let foundColon = false;
                    
                    // Read until we hit a comma that's a separator (not inside an effect value)
                    while (i < effectString.length) {
                        const char = effectString[i];
                        
                        if (char === ':') {
                            foundColon = true;
                            part += char;
                            i++;
                        } else if (char === ',') {
                            // Check if this comma is a separator or part of a value
                            if (foundColon) {
                                const key = part.split(':')[0];
                                // If we're in an "effect:" or "trigger:" value, the comma might be part of the value
                                if (key === 'effect' || key === 'trigger') {
                                    // Look ahead to see if next part is a new key (like "tap" or "trigger:" or "condition:")
                                    let lookAhead = '';
                                    let j = i + 1;
                                    while (j < effectString.length && lookAhead.length < 30 && effectString[j] !== ',') {
                                        lookAhead += effectString[j];
                                        j++;
                                    }
                                    // If next part is a simple key like "tap" (no colon), or starts with a known key, it's a separator
                                    if (lookAhead === 'tap' || 
                                        lookAhead.startsWith('trigger:') || 
                                        lookAhead.startsWith('condition:') ||
                                        lookAhead.startsWith('effect:')) {
                                        // This comma is a separator
                                        i++;
                                        break;
                                    } else {
                                        // This comma is part of the value (e.g., "playCardType:m,t" or "addMilitaryToTypes:i,m,r:1")
                                        part += char;
                                        i++;
                                    }
                                } else {
                                    // For other keys, comma is always a separator
                                    i++;
                                    break;
                                }
                            } else {
                                // No colon yet, comma is a separator
                                i++;
                                break;
                            }
                        } else {
                            part += char;
                            i++;
                        }
                    }
                    
                    if (part.trim()) {
                        parts.push(part.trim());
                    }
                }
                
                let currentEffect = {};
                let effects = [];

                parts.forEach(part => {
                    const [key, ...values] = part.split(':');
                    const value = values.join(':');

                    if (key === 'trigger') {
                        if (Object.keys(currentEffect).length > 0) {
                            effects.push({...currentEffect});
                            currentEffect = {};
                        }
                        currentEffect.trigger = value;
                    } else if (key === 'condition') {
                        if (!currentEffect.conditions) currentEffect.conditions = [];
                        currentEffect.conditions.push({ type: values[0], value: values.slice(1).join(':') });
                    } else if (key === 'effect') {
                        if (!currentEffect.effects) currentEffect.effects = [];
                        // The value might contain:
                        // 1. Commas inside effect values (e.g., "addMilitaryToTypes:i,m,r:1")
                        // 2. Multiple effects separated by commas (e.g., "gainGold:2,addMilitaryPerType:i:2")
                        // 3. "tap" at the end
                        
                        // Check if "tap" is at the end
                        let cleanValue = value;
                        let hasTap = false;
                        if (value.endsWith(',tap')) {
                            cleanValue = value.slice(0, -4); // Remove ",tap"
                            hasTap = true;
                        } else if (value === 'tap') {
                            cleanValue = '';
                            hasTap = true;
                        }
                        
                        // Parse multiple effects - they are in format "effectType:value,effectType:value"
                        // We need to split by commas, but only when the comma is between effects (not inside a value)
                        // Known effect types that can appear: gainGold, addMilitary, addMilitaryPerType, addMilitaryToTypes, 
                        // addCulturePerType, nextCardFree, ruinRandomOpponentCard, doubleConquestCulture, etc.
                        const knownEffectTypes = ['gainGold', 'addMilitary', 'addMilitaryPerType', 'addMilitaryToTypes', 
                                                  'addCulturePerType', 'addCulture', 'addCultureToTypes', 'nextCardFree', 
                                                  'ruinRandomOpponentCard', 'doubleConquestCulture', 'ruinSelf',
                                                  'gainGoldPerType', 'gainGoldPerOpponentType', 'gainGoldPerChosenResource',
                                                  'ruinOpponentType', 'ruinHighCultureOpponentCard', 'stealCulture',
                                                  'convertMilitaryToCulture', 'addCulturePerUniqueType',
                                                  'spendForMilitary', 'spendForCulture', 'removeAllCulture',
                                                  'unruinCard', 'reuseRandomTapped', 'shieldFromEffect',
                                                  'controlRandom', 'wildType', 'swapWithOpponent', 'replaceFromDiscard',
                                                  'stealOpponentCard', 'swapCultureMilitary', 'swapMilitaryWithOpponent',
                                                  'sacrificeAndBoostType', 'sacrificeAndBoostTypeCulture',
                                                  'doubleAdjacentCard', 'addCultureFromAgeGold', 'peaceBonus',
                                                  'payOrRuin', 'winAddCulture', 'loseAddCulture'];
                        
                        const effectParts = [];
                        let currentPart = '';
                        
                        for (let i = 0; i < cleanValue.length; i++) {
                            const char = cleanValue[i];
                            if (char === ',') {
                                // Look ahead to see if next token is a known effect type
                                let lookAhead = '';
                                let j = i + 1;
                                while (j < cleanValue.length && lookAhead.length < 30 && cleanValue[j] !== ',' && cleanValue[j] !== ':') {
                                    lookAhead += cleanValue[j];
                                    j++;
                                }
                                
                                // If the lookahead matches a known effect type, this comma separates effects
                                if (knownEffectTypes.includes(lookAhead)) {
                                    effectParts.push(currentPart.trim());
                                    currentPart = '';
                                } else {
                                    // Comma is part of the value (e.g., "i,m,r" in "addMilitaryToTypes:i,m,r:1")
                                    currentPart += char;
                                }
                            } else {
                                currentPart += char;
                            }
                        }
                        
                        if (currentPart.trim()) {
                            effectParts.push(currentPart.trim());
                        }
                        
                        // Parse each effect part
                        effectParts.forEach(effectPart => {
                            if (!effectPart) return;
                            const colonIndex = effectPart.indexOf(':');
                            if (colonIndex > 0) {
                                const effectType = effectPart.substring(0, colonIndex);
                                const effectValue = effectPart.substring(colonIndex + 1);
                                currentEffect.effects.push({ type: effectType, value: effectValue });
                            } else {
                                // No colon, treat as effect type with empty value
                                currentEffect.effects.push({ type: effectPart, value: '' });
                            }
                        });
                        
                        // Add tap if present
                        if (hasTap) {
                            currentEffect.effects.push({ type: 'tap', value: '' });
                        }
                    } else if (key === 'tap') {
                        if (!currentEffect.effects) currentEffect.effects = [];
                        currentEffect.effects.push({ type: 'tap', value: '' });
                        if (!currentEffect.trigger) {
                            currentEffect.trigger = 'manual';
                        }
                    } else {
                        // Immediate effect (no trigger)
                        currentEffect.type = key;
                        currentEffect.value = value;
                        effects.push({...currentEffect});
                        currentEffect = {};
                    }
                });

                if (Object.keys(currentEffect).length > 0) {
                    effects.push(currentEffect);
                }

                return effects;
            }

            /**
             * Execute a single effect
             */
            executeEffect(player, effect, cardIndex, gameState) {
                const type = effect.type || (effect.effects && effect.effects[0]?.type);
                const value = effect.value || (effect.effects && effect.effects[0]?.value);

                console.log(`Executing effect: ${type}:${value}`);

                switch (type) {
                    case 'goldOnPlay':
                        player.gold += parseInt(value);
                        return true;

                    case 'goldPerAge':
                        // This is triggered at age start, not here
                        return true;

                    case 'resource':
                        player.resources.add(value);
                        return true;

                    case 'military':
                    case 'culture':
                        // Already counted in stats, no action needed
                        return true;

                    case 'tap':
                        if (cardIndex !== undefined) {
                            if (player.wildTypeActive && player.wildTypeActive.cardIndex === cardIndex) return true;
                            player.tappedCards.add(cardIndex);
                        }
                        return true;

                    case 'goldOnPass':
                        player.gold += parseInt(value);
                        return true;

                    case 'gainGold':
                        player.gold += parseInt(value);
                        return true;

                    case 'nextCardFree':
                        player.nextCardFree = true;
                        return true;

                    case 'addMilitary':
                        return this.addMilitaryToCard(player, cardIndex, parseInt(value));

                    case 'addMilitaryPerType':
                        return this.addMilitaryPerType(player, cardIndex, value);

                    case 'addMilitaryToTypes':
                        return this.addMilitaryToTypes(player, value);

                    case 'addCulturePerType':
                        return this.addCulturePerType(player, value, cardIndex);

                    case 'ruinSelf':
                        if (cardIndex !== undefined) {
                            player.ruinedCards.add(cardIndex);
                        }
                        return true;

                    case 'ruinRandomOpponentCard':
                        return this.ruinRandomOpponentCard(player, gameState, !!player.controlRandom);

                    case 'doubleConquestCulture':
                        return this.doubleConquestCulture(player);

                    case 'enablesFree':
                        if (!player.enabledFreeCards) player.enabledFreeCards = [];
                        player.enabledFreeCards.push(value);
                        return true;

                    case 'reduceCostType':
                        if (!player.costReductions) player.costReductions = [];
                        player.costReductions.push(value);
                        return true;

                    case 'goldOnThirdAge':
                        return true;

                    case 'gambling':
                        return true;

                    case 'endGameBonus':
                        return true;

                    case 'endGameGambling':
                        return true;

                    case 'winTies':
                        player.winTies = true;
                        return true;

                    case 'addCulture':
                    case 'winAddCulture':
                    case 'loseAddCulture': {
                        if (cardIndex === undefined) return false;
                        const card = player.tableau[cardIndex];
                        if (!card) return false;
                        if (!card.bonusCulture) card.bonusCulture = 0;
                        card.bonusCulture += parseInt(value);
                        this.game.updatePlayerStats(player);
                        return true;
                    }

                    case 'addCultureToTypes': {
                        const [types, amount] = value.split(':');
                        const cardTypes = types.split(',');
                        const bonus = parseInt(amount);
                        player.tableau.forEach((card, index) => {
                            if (card && cardTypes.includes(card.type) && !player.ruinedCards.has(index)) {
                                if (!card.bonusCulture) card.bonusCulture = 0;
                                card.bonusCulture += bonus;
                            }
                        });
                        this.game.updatePlayerStats(player);
                        return true;
                    }

                    case 'gainGoldPerType': {
                        const [gType, gAmount] = value.split(':');
                        const typeCount = this.countCardType(player, gType);
                        const goldGain = typeCount * parseInt(gAmount);
                        player.gold += goldGain;
                        this.game.showNotification(`${player.name} gains ${goldGain} gold!`);
                        return true;
                    }

                    case 'gainGoldPerOpponentType': {
                        const parts = value.split(':');
                        const opAmount = parseInt(parts[parts.length - 1]);
                        const opTypes = parts.slice(0, -1).join(':').split(',');
                        let totalGold = 0;
                        gameState.players.forEach(opp => {
                            if (opp.id !== player.id) {
                                opTypes.forEach(opType => {
                                    totalGold += this.countCardType(opp, opType) * opAmount;
                                });
                            }
                        });
                        player.gold += totalGold;
                        if (totalGold > 0) this.game.showNotification(`${player.name} gains ${totalGold} gold!`);
                        return true;
                    }

                    case 'gainGoldPerChosenResource': {
                        const resAmount = parseInt(value);
                        let maxGold = 0;
                        const resources = ['a', 'f', 'k', 'm', 's', 'v', 'w'];
                        resources.forEach(res => {
                            let count = 0;
                            player.tableau.forEach((c, idx) => {
                                if (c && !player.ruinedCards.has(idx) && c.resources && c.resources.includes(res)) count++;
                            });
                            maxGold = Math.max(maxGold, count * resAmount);
                        });
                        player.gold += maxGold;
                        this.game.showNotification(`${player.name} gains ${maxGold} gold from resources!`);
                        return true;
                    }

                    case 'ruinOpponentType': {
                        const targetType = value;
                        const opponents = gameState.players.filter(p => p.id !== player.id);
                        const validOpponents = opponents.filter(opp => this.hasCardType(opp, targetType));
                        if (validOpponents.length === 0) {
                            this.game.showNotification('No valid targets!');
                            return false;
                        }
                        const target = validOpponents[Math.floor(Math.random() * validOpponents.length)];
                        const targets = [];
                        target.tableau.forEach((c, idx) => {
                            if (c && c.type === targetType && !target.ruinedCards.has(idx)) {
                                if (c.name === 'Masada' && target.tappedCards.has(idx)) return;
                                targets.push(idx);
                            }
                        });
                        if (targets.length > 0) {
                            const ruinIdx = targets[Math.floor(Math.random() * targets.length)];
                            target.ruinedCards.add(ruinIdx);
                            this.triggerOwnCardRuined(target, ruinIdx, gameState);
                            this.triggerAnyCardRuined(target, ruinIdx, gameState);
                            this.game.showNotification(`${player.name} ruins ${target.name}'s ${target.tableau[ruinIdx].name}!`);
                            this.game.updatePlayerStats(target);
                        }
                        return true;
                    }

                    case 'ruinHighCultureOpponentCard': {
                        const opps = gameState.players.filter(p => p.id !== player.id);
                        if (opps.length === 0) return false;
                        const tgt = opps[Math.floor(Math.random() * opps.length)];
                        let bestIdx = -1, bestCulture = -1;
                        tgt.tableau.forEach((c, idx) => {
                            if (c && !tgt.ruinedCards.has(idx)) {
                                if (c.name === 'Masada' && tgt.tappedCards.has(idx)) return;
                                const cul = (c.culture || 0) + (c.bonusCulture || 0);
                                if (cul > bestCulture) { bestCulture = cul; bestIdx = idx; }
                            }
                        });
                        if (bestIdx >= 0) {
                            tgt.ruinedCards.add(bestIdx);
                            this.triggerOwnCardRuined(tgt, bestIdx, gameState);
                            this.triggerAnyCardRuined(tgt, bestIdx, gameState);
                            this.game.showNotification(`${player.name} ruins ${tgt.name}'s ${tgt.tableau[bestIdx].name}!`);
                            this.game.updatePlayerStats(tgt);
                        }
                        return true;
                    }

                    case 'stealCulture': {
                        const stealAmount = parseInt(value);
                        const stealOpps = gameState.players.filter(p => p.id !== player.id);
                        if (stealOpps.length === 0) return false;
                        const stealTarget = stealOpps[Math.floor(Math.random() * stealOpps.length)];
                        const stolen = Math.min(stealAmount, stealTarget.totalCulture || 0);
                        stealTarget.totalCulture = Math.max(0, (stealTarget.totalCulture || 0) - stolen);
                        player.totalCulture = (player.totalCulture || 0) + stolen;
                        this.game.showNotification(`${player.name} steals ${stolen} culture from ${stealTarget.name}!`);
                        this.game.updatePlayerStats(stealTarget);
                        return true;
                    }

                    case 'convertMilitaryToCulture': {
                        const convAmount = parseInt(value);
                        player.tableau.forEach((c, idx) => {
                            if (c && !player.ruinedCards.has(idx)) {
                                const mil = (c.bonusMilitary || 0);
                                if (mil >= convAmount) {
                                    c.bonusMilitary = mil - convAmount;
                                    if (!c.bonusCulture) c.bonusCulture = 0;
                                    c.bonusCulture += convAmount;
                                }
                            }
                        });
                        this.game.updatePlayerStats(player);
                        this.game.showNotification(`${player.name} converts military to culture!`);
                        return true;
                    }

                    case 'addCulturePerUniqueType': {
                        const typesInPlay = new Set();
                        player.tableau.forEach((c, idx) => {
                            if (c && !player.ruinedCards.has(idx) && c.type) typesInPlay.add(c.type);
                        });
                        const uniqueBonus = typesInPlay.size;
                        if (cardIndex !== undefined) {
                            const tCard = player.tableau[cardIndex];
                            if (tCard) {
                                if (!tCard.bonusCulture) tCard.bonusCulture = 0;
                                tCard.bonusCulture += uniqueBonus;
                            }
                        }
                        this.game.showNotification(`${player.name} gains ${uniqueBonus} culture from ${uniqueBonus} unique types!`);
                        this.game.updatePlayerStats(player);
                        return true;
                    }

                    case 'spendForMilitary': {
                        const [costPer, milPer] = value.split(':').map(Number);
                        const spendable = Math.floor(player.gold / costPer);
                        if (spendable > 0) {
                            const spent = spendable * costPer;
                            const milBonus = spendable * milPer;
                            player.gold -= spent;
                            if (cardIndex !== undefined) {
                                this.addMilitaryToCard(player, cardIndex, milBonus);
                            }
                            this.game.showNotification(`${player.name} spends ${spent} gold for +${milBonus} military!`);
                        }
                        return true;
                    }

                    case 'spendForCulture': {
                        const [cCostPer, cCulPer] = value.split(':').map(Number);
                        const cSpendable = Math.floor(player.gold / cCostPer);
                        if (cSpendable > 0) {
                            const cSpent = cSpendable * cCostPer;
                            const culBonus = cSpendable * cCulPer;
                            player.gold -= cSpent;
                            if (cardIndex !== undefined) {
                                const cCard = player.tableau[cardIndex];
                                if (cCard) {
                                    if (!cCard.bonusCulture) cCard.bonusCulture = 0;
                                    cCard.bonusCulture += culBonus;
                                }
                            }
                            this.game.showNotification(`${player.name} spends ${cSpent} gold for +${culBonus} culture!`);
                            this.game.updatePlayerStats(player);
                        }
                        return true;
                    }

                    case 'removeAllCulture': {
                        const remAmount = parseInt(value);
                        player.tableau.forEach((c, idx) => {
                            if (c && !player.ruinedCards.has(idx)) {
                                if (!c.bonusCulture) c.bonusCulture = 0;
                                c.bonusCulture -= remAmount;
                            }
                        });
                        this.game.updatePlayerStats(player);
                        this.game.showNotification(`${player.name} removes culture from all cards!`);
                        return true;
                    }

                    case 'unruinCard': {
                        if (player.ruinedCards.size > 0) {
                            const ruinedArr = Array.from(player.ruinedCards);
                            const unruinIdx = ruinedArr[Math.floor(Math.random() * ruinedArr.length)];
                            player.ruinedCards.delete(unruinIdx);
                            player.tappedCards.add(unruinIdx);
                            this.game.showNotification(`${player.name} restores ${player.tableau[unruinIdx].name}!`);
                            this.game.updatePlayerStats(player);
                        }
                        return true;
                    }

                    case 'reuseRandomTapped': {
                        const tappedArr = Array.from(player.tappedCards).filter(idx =>
                            player.tableau[idx] && !player.ruinedCards.has(idx) && idx !== cardIndex
                        );
                        if (tappedArr.length > 0) {
                            const reuseIdx = tappedArr[Math.floor(Math.random() * tappedArr.length)];
                            player.tappedCards.delete(reuseIdx);
                            const reuseCard = player.tableau[reuseIdx];
                            this.manuallyActivateCard(player, reuseIdx, gameState);
                            this.game.showNotification(`${player.name} reuses ${reuseCard.name}'s ability!`);
                        }
                        return true;
                    }

                    case 'shieldFromEffect':
                        player.shielded = true;
                        this.game.showNotification(`${player.name} is shielded from the next effect!`);
                        return true;

                    case 'peaceBonus': {
                        if (cardIndex === undefined) return false;
                        const card = player.tableau[cardIndex];
                        if (!card) return false;
                        if (!card.bonusCulture) card.bonusCulture = 0;
                        card.bonusCulture += parseInt(value || 2);
                        this.game.updatePlayerStats(player);
                        return true;
                    }

                    case 'swapCultureMilitary': {
                        let bestIdx = -1, bestCulture = -1;
                        player.tableau.forEach((c, idx) => {
                            if (c && !player.ruinedCards.has(idx)) {
                                const cul = (c.culture || 0) + (c.bonusCulture || 0);
                                if (cul > bestCulture) { bestCulture = cul; bestIdx = idx; }
                            }
                        });
                        if (bestIdx >= 0) {
                            const card = player.tableau[bestIdx];
                            const tempCulture = card.bonusCulture || 0;
                            card.bonusCulture = card.bonusMilitary || 0;
                            card.bonusMilitary = tempCulture;
                            this.game.updatePlayerStats(player);
                            this.game.showNotification(`${player.name} swaps culture/military on ${card.name}!`);
                        }
                        return true;
                    }

                    case 'swapMilitaryWithOpponent': {
                        const opponents = gameState.players.filter(p => p.id !== player.id);
                        const oppsWithMilitary = opponents.filter(opp => {
                            return opp.tableau.some((c, idx) => c && !opp.ruinedCards.has(idx) && ((c.military || 0) + (c.bonusMilitary || 0)) > 0);
                        });
                        if (oppsWithMilitary.length === 0 || cardIndex === undefined) return false;
                        const target = oppsWithMilitary[Math.floor(Math.random() * oppsWithMilitary.length)];
                        const myCard = player.tableau[cardIndex];
                        if (!myCard) return false;
                        const oppTargets = [];
                        target.tableau.forEach((c, idx) => {
                            if (c && !target.ruinedCards.has(idx) && ((c.military || 0) + (c.bonusMilitary || 0)) > 0) oppTargets.push(idx);
                        });
                        if (oppTargets.length === 0) return false;
                        const oppIdx = oppTargets[Math.floor(Math.random() * oppTargets.length)];
                        const oppCard = target.tableau[oppIdx];
                        const tempMil = myCard.bonusMilitary || 0;
                        myCard.bonusMilitary = oppCard.bonusMilitary || 0;
                        oppCard.bonusMilitary = tempMil;
                        this.game.updatePlayerStats(player);
                        this.game.updatePlayerStats(target);
                        this.game.showNotification(`${player.name} swaps military with ${target.name}'s ${oppCard.name}!`);
                        return true;
                    }

                    case 'sacrificeAndBoostType': {
                        const boostAmount = parseInt(value || '2') || 2;
                        const byType = {};
                        player.tableau.forEach((c, idx) => {
                            if (c && !player.ruinedCards.has(idx) && idx !== cardIndex) {
                                if (!byType[c.type]) byType[c.type] = [];
                                byType[c.type].push({ idx, card: c, value: (c.culture || 0) + (c.bonusCulture || 0) + (c.military || 0) + (c.bonusMilitary || 0) });
                            }
                        });
                        let sacrificeIdx = -1, sacrificeType = null;
                        for (const [t, arr] of Object.entries(byType)) {
                            if (arr.length >= 2) {
                                arr.sort((a, b) => a.value - b.value);
                                sacrificeIdx = arr[0].idx;
                                sacrificeType = t;
                                break;
                            }
                        }
                        if (sacrificeIdx < 0) return false;
                        player.ruinedCards.add(sacrificeIdx);
                        player.tableau.forEach((c, idx) => {
                            if (c && c.type === sacrificeType && !player.ruinedCards.has(idx)) {
                                if (!c.bonusMilitary) c.bonusMilitary = 0;
                                c.bonusMilitary += boostAmount;
                            }
                        });
                        this.game.updatePlayerStats(player);
                        this.game.showNotification(`${player.name} sacrifices for military boost!`);
                        return true;
                    }

                    case 'sacrificeAndBoostTypeCulture': {
                        const boostAmount = parseInt(value || '2') || 2;
                        const byType = {};
                        player.tableau.forEach((c, idx) => {
                            if (c && !player.ruinedCards.has(idx) && idx !== cardIndex) {
                                if (!byType[c.type]) byType[c.type] = [];
                                byType[c.type].push({ idx, card: c, value: (c.culture || 0) + (c.bonusCulture || 0) + (c.military || 0) + (c.bonusMilitary || 0) });
                            }
                        });
                        let sacrificeIdxC = -1, sacrificeTypeC = null;
                        for (const [t, arr] of Object.entries(byType)) {
                            if (arr.length >= 2) {
                                arr.sort((a, b) => a.value - b.value);
                                sacrificeIdxC = arr[0].idx;
                                sacrificeTypeC = t;
                                break;
                            }
                        }
                        if (sacrificeIdxC < 0) return false;
                        player.ruinedCards.add(sacrificeIdxC);
                        player.tableau.forEach((c, idx) => {
                            if (c && c.type === sacrificeTypeC && !player.ruinedCards.has(idx)) {
                                if (!c.bonusCulture) c.bonusCulture = 0;
                                c.bonusCulture += boostAmount;
                            }
                        });
                        this.game.updatePlayerStats(player);
                        this.game.showNotification(`${player.name} sacrifices for culture boost!`);
                        return true;
                    }

                    case 'doubleAdjacentCard': {
                        if (cardIndex === undefined) return false;
                        const nextIdx = cardIndex + 1;
                        if (nextIdx >= player.tableau.length) return false;
                        const adjCard = player.tableau[nextIdx];
                        if (!adjCard || player.ruinedCards.has(nextIdx)) return false;
                        adjCard.bonusCulture = (adjCard.bonusCulture || 0) * 2;
                        adjCard.bonusMilitary = (adjCard.bonusMilitary || 0) * 2;
                        this.game.updatePlayerStats(player);
                        this.game.showNotification(`${player.name} doubles adjacent ${adjCard.name}!`);
                        return true;
                    }

                    case 'addCultureFromAgeGold': {
                        if (cardIndex === undefined) return false;
                        const card = player.tableau[cardIndex];
                        if (!card) return false;
                        const ageGold = player.ageStartGoldFromCards || 0;
                        if (!card.bonusCulture) card.bonusCulture = 0;
                        card.bonusCulture += ageGold;
                        this.game.updatePlayerStats(player);
                        this.game.showNotification(`${player.name}'s ${card.name} gains ${ageGold} culture from age gold!`);
                        return true;
                    }

                    case 'swapWithOpponent': {
                        const targetTypes = value ? value.split(',') : null;
                        const opponents = gameState.players.filter(p => p.id !== player.id);
                        const validOpponents = opponents.filter(opp => {
                            if (!opp.tableau) return false;
                            return opp.tableau.some((c, idx) => {
                                if (!c || opp.ruinedCards.has(idx)) return false;
                                if (!targetTypes) return true;
                                return targetTypes.includes(c.type);
                            });
                        });
                        if (validOpponents.length === 0) return false;
                        const target = validOpponents[Math.floor(Math.random() * validOpponents.length)];
                        const oppTargets = [];
                        target.tableau.forEach((c, idx) => {
                            if (c && !target.ruinedCards.has(idx)) {
                                if (!targetTypes || targetTypes.includes(c.type)) oppTargets.push(idx);
                            }
                        });
                        if (oppTargets.length === 0) return false;
                        const oppIdx = oppTargets[Math.floor(Math.random() * oppTargets.length)];
                        const myCard = player.tableau[cardIndex];
                        const oppCard = target.tableau[oppIdx];
                        player.tableau[cardIndex] = oppCard;
                        target.tableau[oppIdx] = myCard;
                        target.tappedCards.add(oppIdx);
                        this.game.updatePlayerStats(player);
                        this.game.updatePlayerStats(target);
                        this.game.showNotification(`${player.name} swaps ${myCard.name} with ${target.name}'s ${oppCard.name}!`);
                        return true;
                    }

                    case 'replaceFromDiscard': {
                        const age = this.game.state.currentAge;
                        const discard = this.game.state.discardPiles && this.game.state.discardPiles[age];
                        if (!discard || discard.length === 0) return false;
                        const myCard = player.tableau[cardIndex];
                        const bestIdx = discard.reduce((best, c, i) => {
                            const cVal = (c.culture || 0) + (c.military || 0) + ((c.cost || 0) * 0.5);
                            return !best || cVal > (discard[best].culture || 0) + (discard[best].military || 0) + ((discard[best].cost || 0) * 0.5) ? i : best;
                        }, 0);
                        const newCard = discard.splice(bestIdx, 1)[0];
                        discard.push(myCard);
                        player.tableau[cardIndex] = newCard;
                        this.game.updatePlayerStats(player);
                        this.game.showNotification(`${player.name} replaces ${myCard.name} with ${newCard.name} from discard!`);
                        return true;
                    }

                    case 'stealOpponentCard': {
                        if (!player.wonWarThisPhase) {
                            this.game.showNotification('You must win a war first to use this ability!');
                            return false;
                        }
                        const opps = gameState.players.filter(p => p.id !== player.id);
                        const oppsWithCards = opps.filter(opp => opp.tableau.some((c, idx) => c && !opp.ruinedCards.has(idx)));
                        if (oppsWithCards.length === 0) return false;
                        const target = oppsWithCards[Math.floor(Math.random() * oppsWithCards.length)];
                        const stealTargets = [];
                        target.tableau.forEach((c, idx) => {
                            if (c && !target.ruinedCards.has(idx)) stealTargets.push(idx);
                        });
                        if (stealTargets.length === 0) return false;
                        const stealIdx = stealTargets[Math.floor(Math.random() * stealTargets.length)];
                        const stolenCard = target.tableau[stealIdx];
                        target.tableau[stealIdx] = null;
                        const emptySlot = player.tableau.findIndex(c => !c);
                        if (emptySlot >= 0) {
                            player.tableau[emptySlot] = stolenCard;
                        } else {
                            player.tableau.push(stolenCard); // Fallback if tableau full (edge case)
                        }
                        this.game.updatePlayerStats(player);
                        this.game.updatePlayerStats(target);
                        this.game.showNotification(`${player.name} steals ${stolenCard.name} from ${target.name}!`);
                        return true;
                    }

                    case 'controlRandom':
                        player.controlRandom = true;
                        this.game.showNotification(`${player.name} will choose the next random result!`);
                        return true;

                    case 'wildType': {
                        const types = ['a','c','e','f','h','i','m','n','p','r','t','u','w'];
                        let bestType = 'e';
                        let bestCount = 0;
                        types.forEach(t => {
                            const cnt = this.countCardType(player, t);
                            if (cnt > bestCount) { bestCount = cnt; bestType = t; }
                        });
                        player.wildTypeActive = { cardIndex, type: bestType };
                        this.game.showNotification(`${player.name}'s card counts as type ${bestType}!`);
                        return true;
                    }

                    default:
                        if (typeof window !== 'undefined' && window.DEBUG_CIV_GAME) {
                            console.warn(`Unknown effect type: ${type}`);
                        }
                        return false;
                }
            }

            /**
             * Check if a condition is met
             */
            checkCondition(player, conditions, gameState) {
                if (!conditions || !Array.isArray(conditions)) return true;

                for (let cond of conditions) {
                    const condType = cond.type;
                    const condValue = cond.value || '';

                    switch (condType) {
                        case 'hasType':
                            if (!this.hasCardType(player, condValue)) return false;
                            break;

                        case 'countType': {
                            const [cardType, requiredStr] = condValue.split(':');
                            const required = parseInt(requiredStr) || 0;
                            if (this.countCardType(player, cardType) < required) return false;
                            break;
                        }

                        case 'opponentLacksType':
                            if (this.anyOpponentHasType(player, condValue, gameState)) return false;
                            break;

                        default:
                            if (typeof window !== 'undefined' && window.DEBUG_CIV_GAME) {
                                console.warn(`Unknown condition: ${condType}`);
                            }
                            return false;
                    }
                }

                return true;
            }

            // Helper methods for effect execution

            hasCardType(player, cardType) {
                const hasReal = player.tableau.some((card, index) =>
                    card && card.type === cardType && !player.ruinedCards.has(index)
                );
                if (hasReal) return true;
                if (player.wildTypeActive && player.wildTypeActive.type === cardType) {
                    const card = player.tableau[player.wildTypeActive.cardIndex];
                    if (card && !player.ruinedCards.has(player.wildTypeActive.cardIndex)) {
                        player.tappedCards.add(player.wildTypeActive.cardIndex);
                        player.wildTypeActive = null;
                        return true;
                    }
                }
                return false;
            }

            countCardType(player, cardType) {
                let count = player.tableau.filter((card, index) =>
                    card && card.type === cardType && !player.ruinedCards.has(index)
                ).length;
                if (player.wildTypeActive && player.wildTypeActive.type === cardType) {
                    const card = player.tableau[player.wildTypeActive.cardIndex];
                    if (card && !player.ruinedCards.has(player.wildTypeActive.cardIndex)) {
                        count++;
                        player.tappedCards.add(player.wildTypeActive.cardIndex);
                        player.wildTypeActive = null;
                    }
                }
                return count;
            }

            anyOpponentHasType(player, cardType, gameState) {
                return gameState.players.some(p =>
                    p.id !== player.id && this.hasCardType(p, cardType)
                );
            }

            addMilitaryToCard(player, cardIndex, amount) {
                if (cardIndex === undefined) return false;
                const card = player.tableau[cardIndex];
                if (!card) return false;

                if (!card.bonusMilitary) card.bonusMilitary = 0;
                card.bonusMilitary += amount;

                this.game.updatePlayerStats(player);
                return true;
            }

            addMilitaryPerType(player, cardIndex, value) {
                const [cardType, amount] = value.split(':');
                const count = this.countCardType(player, cardType);
                const bonus = count * parseInt(amount);

                return this.addMilitaryToCard(player, cardIndex, bonus);
            }

            addMilitaryToTypes(player, value) {
                const [types, amount] = value.split(':');
                const cardTypes = types.split(',');
                const bonus = parseInt(amount);

                player.tableau.forEach((card, index) => {
                    if (card && cardTypes.includes(card.type) && !player.ruinedCards.has(index)) {
                        if (!card.bonusMilitary) card.bonusMilitary = 0;
                        card.bonusMilitary += bonus;
                    }
                });

                this.game.updatePlayerStats(player);
                return true;
            }

            addCulturePerType(player, value, cardIndex) {
                const [cardType, amount] = value.split(':');
                const count = this.countCardType(player, cardType);
                const bonus = count * parseInt(amount);

                if (cardIndex !== undefined && player.tableau[cardIndex]) {
                    const card = player.tableau[cardIndex];
                    if (!card.bonusCulture) card.bonusCulture = 0;
                    card.bonusCulture += bonus;
                    this.game.updatePlayerStats(player);
                } else {
                    player.totalCulture += bonus;
                }
                this.game.showNotification(`${player.name} gains ${bonus} culture!`);
                return true;
            }

            ruinRandomOpponentCard(player, gameState, pickBest = false) {
                const opponents = gameState.players.filter(p => p.id !== player.id);
                if (opponents.length === 0) return false;

                // Find opponents without fortified cards
                const vulnerableOpponents = opponents.filter(opp =>
                    !this.hasCardType(opp, 'f')
                );

                if (vulnerableOpponents.length === 0) {
                    this.game.showNotification('All opponents have fortifications!');
                    return false;
                }

                // Pick random opponent
                const target = vulnerableOpponents[Math.floor(Math.random() * vulnerableOpponents.length)];

                // Find non-ruined cards
                const validTargets = [];
                target.tableau.forEach((card, index) => {
                    if (card && !target.ruinedCards.has(index)) {
                        if (card.name === 'Masada' && target.tappedCards.has(index)) return;
                        validTargets.push(index);
                    }
                });

                if (validTargets.length === 0) return false;

                let targetIndex;
                if (pickBest) {
                    targetIndex = validTargets.reduce((best, idx) => {
                        const c = target.tableau[idx];
                        const val = (c.culture || 0) + (c.bonusCulture || 0);
                        const bestVal = target.tableau[best] ? (target.tableau[best].culture || 0) + (target.tableau[best].bonusCulture || 0) : -1;
                        return val > bestVal ? idx : best;
                    }, validTargets[0]);
                    player.controlRandom = false;
                } else {
                    targetIndex = validTargets[Math.floor(Math.random() * validTargets.length)];
                }
                target.ruinedCards.add(targetIndex);
                this.triggerOwnCardRuined(target, targetIndex, gameState);
                this.triggerAnyCardRuined(target, targetIndex, gameState);

                this.game.showNotification(`${player.name} ruins ${target.name}'s ${target.tableau[targetIndex].name}!`);
                this.game.updatePlayerStats(target);
                return true;
            }

            doubleConquestCulture(player) {
                if (!player.conquestCulture) player.conquestCulture = 0;
                const bonus = player.conquestCulture;
                player.totalCulture += bonus;

                this.game.showNotification(`${player.name} doubles conquest culture: +${bonus}!`);
                return true;
            }

            /**
             * Trigger effects at age start (goldPerAge bonuses)
             */
            triggerAgeStart(player) {
                player.tableau.forEach((card, index) => {
                    if (!card || player.ruinedCards.has(index)) return;
                    if (card.effect && card.effect.includes('goldPerAge')) {
                        const match = card.effect.match(/goldPerAge:(\d+)/);
                        if (match) {
                            const amount = parseInt(match[1]);
                            player.gold += amount;
                            player.ageStartGoldFromCards = (player.ageStartGoldFromCards || 0) + amount;
                            console.log(`${card.name} grants ${amount} gold at age start`);
                        }
                    }
                    if (card.effect && card.effect.includes('goldOnThirdAge') && this.game.state.currentAge === 3) {
                        const match = card.effect.match(/goldOnThirdAge:(\d+)/);
                        if (match) {
                            const amount = parseInt(match[1]);
                            player.gold += amount;
                            player.ageStartGoldFromCards = (player.ageStartGoldFromCards || 0) + amount;
                            this.game.showNotification(`${player.name}'s ${card.name} grants ${amount} gold for Age III!`);
                        }
                    }
                    if (card.effect && card.effect.includes('gambling:') && !card.effect.includes('endGameGambling:')) {
                        const match = card.effect.match(/gambling:(\d+):(\d+):(\d+)/);
                        if (match) {
                            const winAmount = parseInt(match[1]);
                            const loseAmount = parseInt(match[2]);
                            const winChance = parseInt(match[3]);
                            const roll = Math.floor(Math.random() * 6) + 1;
                            const amount = roll <= winChance ? winAmount : loseAmount;
                            player.gold += amount;
                            player.ageStartGoldFromCards = (player.ageStartGoldFromCards || 0) + amount;
                            if (roll <= winChance) {
                                this.game.showNotification(`🎲 ${player.name}'s ${card.name} wins! +${winAmount} gold!`);
                            } else {
                                this.game.showNotification(`🎲 ${player.name}'s ${card.name} loses! +${loseAmount} gold only.`);
                            }
                        }
                    }
                });
            }

            /**
             * Trigger end of age effects
             */
            triggerEndOfAge(player) {
                player.tableau.forEach((card, index) => {
                    if (!card || player.ruinedCards.has(index)) return;
                    if (card.effect && card.effect.includes('trigger:endOfAge')) {
                        console.log(`Triggering end-of-age effect for ${card.name}`);
                        const effects = this.parseEffectString(card.effect);
                        effects.filter(e => e.trigger === 'endOfAge').forEach(effect => {
                            if (effect.effects) {
                                effect.effects.forEach(triggerEffect => {
                                    if (triggerEffect.type === 'addCulture') {
                                        if (!card.bonusCulture) card.bonusCulture = 0;
                                        card.bonusCulture += parseInt(triggerEffect.value);
                                        this.game.showNotification(`${player.name}'s ${card.name} gains ${triggerEffect.value} culture!`);
                                    } else if (triggerEffect.type === 'payOrRuin') {
                                        const payCost = parseInt(triggerEffect.value);
                                        if (player.gold >= payCost) {
                                            player.gold -= payCost;
                                            this.game.showNotification(`${player.name} pays ${payCost} gold for ${card.name}.`);
                                        } else {
                                            player.ruinedCards.add(index);
                                            this.triggerOwnCardRuined(player, index, this.game.state);
                                            this.triggerAnyCardRuined(player, index, this.game.state);
                                            this.game.showNotification(`${player.name} can't pay for ${card.name} - RUINED!`);
                                        }
                                    } else {
                                        this.executeEffect(player, triggerEffect, index, this.game.state);
                                    }
                                });
                            } else {
                                this.executeEffect(player, effect, index, this.game.state);
                            }
                        });
                        this.game.updatePlayerStats(player);
                    }
                });
            }

            /**
             * Trigger reactive effects when a card is played
             * Handles both playCardType (own cards) and otherPlayerPlaysType (opponent cards)
             * @param {Object} playedByPlayer - The player who played the card
             * @param {Object} playedCard - The card that was played
             * @param {Object} gameState - Current game state
             */
            triggerReactiveEffects(playedByPlayer, playedCard, gameState) {
                if (!playedCard || !playedCard.type) return;

                const playedType = playedCard.type;
                console.log(`Checking reactive triggers for ${playedCard.name} (type: ${playedType})`);

                // Check all players' tableaus for reactive cards
                gameState.players.forEach(reactingPlayer => {
                    reactingPlayer.tableau.forEach((card, cardIndex) => {
                        if (!card || !card.effect || reactingPlayer.ruinedCards.has(cardIndex)) return;

                        const effects = this.parseEffectString(card.effect);

                        effects.forEach(effect => {
                            let shouldTrigger = false;
                            let triggerTypes = [];

                            // Check for playCardType trigger (reacts to own cards)
                            if (effect.trigger && effect.trigger.startsWith('playCardType:')) {
                                if (reactingPlayer.id === playedByPlayer.id) {
                                    triggerTypes = effect.trigger.substring('playCardType:'.length).split(',');
                                    shouldTrigger = triggerTypes.includes(playedType);
                                }
                            }

                            // Check for otherPlayerPlaysType trigger (reacts to opponent cards)
                            if (effect.trigger && effect.trigger.startsWith('otherPlayerPlaysType:')) {
                                if (reactingPlayer.id !== playedByPlayer.id) {
                                    triggerTypes = effect.trigger.substring('otherPlayerPlaysType:'.length).split(',');
                                    shouldTrigger = triggerTypes.includes(playedType);
                                }
                            }

                            // Check for anyPlayerPlaysType trigger (reacts to any player's cards including own)
                            if (effect.trigger && effect.trigger.startsWith('anyPlayerPlaysType:')) {
                                triggerTypes = effect.trigger.substring('anyPlayerPlaysType:'.length).split(',');
                                shouldTrigger = triggerTypes.includes(playedType);
                            }

                            if (shouldTrigger) {
                                console.log(`🎯 REACTIVE TRIGGER: ${reactingPlayer.name}'s ${card.name} reacts to ${playedCard.name}!`);

                                // Execute the trigger's effects
                                if (effect.effects) {
                                    effect.effects.forEach(triggerEffect => {
                                        this.executeEffect(reactingPlayer, triggerEffect, cardIndex, gameState);
                                    });
                                }

                                this.game.logAction('reactive_trigger', `🔗 ${reactingPlayer.name}'s ${card.name} triggered (reacted to ${playedByPlayer.name}'s ${playedCard.name})`, {
                                    reactingPlayer: reactingPlayer.name,
                                    reactingCard: card.name,
                                    triggeringPlayer: playedByPlayer.name,
                                    triggeringCard: playedCard.name
                                });

                                this.game.showNotification(`🔗 ${reactingPlayer.name}'s ${card.name} triggers! (reacted to ${playedCard.name})`);
                                this.game.updatePlayerStats(reactingPlayer);
                            }
                        });
                    });
                });
            }

            /**
             * Trigger war declared effects when a player is attacked
             * @param {Object} defender - The player being attacked
             * @param {Object} attacker - The player attacking
             * @param {Object} gameState - Current game state
             */
            triggerWarDeclaredEffects(defender, attacker, gameState) {
                console.log(`Checking warDeclared triggers for ${defender.name} (attacked by ${attacker.name})`);

                defender.tableau.forEach((card, cardIndex) => {
                    if (!card || !card.effect || defender.ruinedCards.has(cardIndex)) return;
                    if (defender.tappedCards.has(cardIndex)) return; // Already tapped, can't trigger

                    if (card.effect.includes('trigger:warDeclared')) {
                        console.log(`🛡️ WAR TRIGGER: ${defender.name}'s ${card.name} activates defensive ability!`);

                        const effects = this.parseEffectString(card.effect);
                        const warEffects = effects.filter(e => e.trigger === 'warDeclared');

                        warEffects.forEach(effect => {
                            // Execute the effects
                            if (effect.effects) {
                                effect.effects.forEach(triggerEffect => {
                                    this.executeEffect(defender, triggerEffect, cardIndex, gameState);
                                });
                            }
                        });

                        // Tap the card if specified
                        if (card.effect.includes('tap')) {
                            defender.tappedCards.add(cardIndex);
                        }

                        this.game.showNotification(`🛡️ ${defender.name}'s ${card.name} triggers defensive ability!`);
                        this.game.updatePlayerStats(defender);
                    }
                });
            }

            /**
             * Trigger when one of this player's cards is ruined (The Black Legion)
             */
            triggerOwnCardRuined(ruinedPlayer, ruinedCardIndex, gameState) {
                ruinedPlayer.tableau.forEach((card, cardIndex) => {
                    if (!card || ruinedPlayer.ruinedCards.has(cardIndex)) return;
                    if (!card.effect || !card.effect.includes('trigger:ownCardRuined')) return;

                    const effects = this.parseEffectString(card.effect);
                    effects.filter(e => e.trigger === 'ownCardRuined').forEach(effect => {
                        if (effect.effects) {
                            effect.effects.forEach(triggerEffect => {
                                this.executeEffect(ruinedPlayer, triggerEffect, cardIndex, gameState);
                            });
                        }
                    });
                    this.game.showNotification(`${ruinedPlayer.name}'s ${card.name} triggers!`);
                    this.game.updatePlayerStats(ruinedPlayer);
                });
            }

            /**
             * Trigger when any card is ruined - check all players (Mausoleum of Halicarnassus)
             */
            triggerAnyCardRuined(ruinedPlayer, ruinedCardIndex, gameState) {
                gameState.players.forEach(reactingPlayer => {
                    if (!reactingPlayer) return;
                    reactingPlayer.tableau.forEach((card, cardIndex) => {
                        if (!card || reactingPlayer.ruinedCards.has(cardIndex)) return;
                        if (!card.effect || !card.effect.includes('trigger:anyCardRuined')) return;

                        const effects = this.parseEffectString(card.effect);
                        effects.filter(e => e.trigger === 'anyCardRuined').forEach(effect => {
                            if (effect.effects) {
                                effect.effects.forEach(triggerEffect => {
                                    this.executeEffect(reactingPlayer, triggerEffect, cardIndex, gameState);
                                });
                            }
                        });
                        this.game.showNotification(`${reactingPlayer.name}'s ${card.name} triggers!`);
                        this.game.updatePlayerStats(reactingPlayer);
                    });
                });
            }

            /**
             * Trigger when player wins conquest or war (Spoils of War)
             */
            triggerWinConquestOrWar(winner, gameState) {
                winner.tableau.forEach((card, cardIndex) => {
                    if (!card || winner.ruinedCards.has(cardIndex)) return;
                    if (!card.effect || !card.effect.includes('trigger:winConquestOrWar')) return;

                    const effects = this.parseEffectString(card.effect);
                    effects.filter(e => e.trigger === 'winConquestOrWar').forEach(effect => {

                                this.executeEffect(winner, triggerEffect, cardIndex, gameState);
                            });
                        }

                    this.game.showNotification(`${winner.name}'s ${card.name} triggers!`);
                    this.game.updatePlayerStats(winner);
                });

            /**
             * Trigger when player wins or loses a war (Great Lament)
             * @param {Object} player - The attacker (if won) or defender (if lost)
             * @param {boolean} won - true if player won the war
             */
            triggerWarResult(player, won, gameState) {
                player.tableau.forEach((card, cardIndex) => {
                    if (!card || player.ruinedCards.has(cardIndex)) return;
                    if (!card.effect || !card.effect.includes('trigger:warResult')) return;

                    const effects = this.parseEffectString(card.effect);
                    effects.filter(e => e.trigger === 'warResult').forEach(effect => {
                        if (effect.effects) {
                            effect.effects.forEach(triggerEffect => {
                                if (won && triggerEffect.type === 'winAddCulture') {
                                    this.executeEffect(player, triggerEffect, cardIndex, gameState);
                                } else if (!won && triggerEffect.type === 'loseAddCulture') {
                                    this.executeEffect(player, triggerEffect, cardIndex, gameState);
                                }
                            });
                        }
                    });
                    this.game.updatePlayerStats(player);
                });

            /**

            triggerAnyResourceUsed(usingPlayer, gameState) {

                    owner.tableau.forEach((card, cardIndex) => {

                        if (!card.effect || !card.effect.includes('trigger:anyResourceUsed')) return;

                        effects.filter(e => e.trigger === 'anyResourceUsed').forEach(effect => {

            triggerAutoMithridatesForWarWinners(gameState) {
                gameState.players.forEach((player) => {

                    player.tableau.forEach((card, cardIndex) => {

            /**

             * @param {Set} playersInWar - Set of player indices who participated in war (attacker or defender)
             */
            triggerWarPhasePeaceBonus(gameState, playersInWar) {
                gameState.players.forEach((player, index) => {
                    if (!player || playersInWar.has(index)) return;
                    player.tableau.forEach((card, cardIndex) => {
                        if (!card || player.ruinedCards.has(cardIndex)) return;
                        if (!card.effect || !card.effect.includes('trigger:warPhase')) return;

                        const effects = this.parseEffectString(card.effect);
                        effects.filter(e => e.trigger === 'warPhase').forEach(effect => {

            getPlacePhaseDescription() {
                const humanPlayersWaiting = this.game.state.players.filter(p => 
                    p.type === 'human' && !p.placedCard
                ).length;
                
                const aiPlayersWaiting = this.game.state.players.filter(p => 
                    p.type.startsWith('ai-') && !p.placedCard
                ).length;
                
                const humanTimeLimit = this.game.state.settings.humanThinkingTime;
                const aiTimeLimit = this.game.state.settings.aiThinkingTime;
                
                const playersPlaced = this.game.state.players.filter(p => p.placedCard).length;
                const totalPlayers = this.game.state.players.length;
                
                // Check if all players are AI
                const allPlayersAI = this.game.state.players.every(player => player.type.startsWith('ai-'));
                
                if (playersPlaced === totalPlayers) {
                    if (allPlayersAI) {
                        return `🤖 All AI players have placed cards! Auto-advancing in 1 second... [${playersPlaced}/${totalPlayers} done]`;
                    } else {
                        return `🎯 All ${totalPlayers} players have placed cards! Ready to reveal.`;
                    }
                } else if (humanPlayersWaiting > 0 && aiPlayersWaiting > 0) {
                    return `⏳ Waiting: ${humanPlayersWaiting} human player(s) (${humanTimeLimit === 0 ? '∞' : humanTimeLimit}s) and ${aiPlayersWaiting} AI player(s) (${aiTimeLimit}s) [${playersPlaced}/${totalPlayers} done]`;
                } else if (humanPlayersWaiting > 0) {
                    return `👤 Waiting for ${humanPlayersWaiting} human player(s) to select cards (${humanTimeLimit === 0 ? 'unlimited time' : humanTimeLimit + ' seconds'}) [${playersPlaced}/${totalPlayers} done]`;
                } else if (aiPlayersWaiting > 0) {
                    if (allPlayersAI) {
                        return `🤖 AI-only game: ${aiPlayersWaiting} AI player(s) still thinking... (up to ${aiTimeLimit} seconds each) [${playersPlaced}/${totalPlayers} done]`;
                    } else {
                        return `🤖 AI players are thinking... (up to ${aiTimeLimit} seconds each) [${playersPlaced}/${totalPlayers} done]`;

                    return `✅ All players have selected their cards [${playersPlaced}/${totalPlayers}]`;

            addToEffectsLog(playerIndex, message) {
                const logContent = document.getElementById(`effects-log-content-${playerIndex}`);
                if (!logContent) return;
                
                const entry = document.createElement('div');
                entry.className = 'effects-log-entry';

            /**
             * Get tableau indices that would be affected if this hand card were played
             */
            getAffectedTableauIndices(playerIndex, card) {
                const indices = new Set();
                if (!card || !card.effect || !this.game) return indices;
                const player = this.game.state.players[playerIndex];
                if (!player || !player.tableau) return indices;
                const state = this.game.state;
                const placementIdx = (state.currentAge - 1) * 6 + (state.currentTurn - 1);
                
                const ef = card.effect;
                if (ef.includes('doubleAdjacentCard')) {
                    const nextIdx = placementIdx + 1;
                    if (nextIdx < 18) indices.add(nextIdx);
                }
                if (ef.includes('addCultureToTypes:')) {
                    const m = ef.match(/addCultureToTypes:([a-z,]+)(?::\d+)?/);
                    if (m) {
                        const types = m[1].split(',').filter(Boolean);
                        player.tableau.forEach((c, i) => {
                            if (c && types.includes(c.type) && !player.ruinedCards.has(i)) indices.add(i);
                        });
                    }
                }
                if (ef.includes('addMilitaryToTypes:')) {
                    const m = ef.match(/addMilitaryToTypes:([a-z,]+)/);
                    if (m) {
                        const types = m[1].split(',');
                        player.tableau.forEach((c, i) => {
                            if (c && types.includes(c.type) && !player.ruinedCards.has(i)) indices.add(i);
                        });
                    }
                }
                if (ef.includes('sacrificeAndBoostType')) {
                    const t = card.type;
                    player.tableau.forEach((c, i) => {
                        if (c && c.type === t && i !== placementIdx && !player.ruinedCards.has(i)) indices.add(i);
                    });
                }
                return indices;
            }

                const tableau = document.getElementById(`tableau-${playerIndex}`);

                tableau.querySelectorAll('[data-tableau-index]').forEach(slot => {
                    const idx = parseInt(slot.dataset.tableauIndex, 10);
                    slot.classList.toggle('affected-by-hover', indices.has(idx));
                });
            }
            
            clearTableauHighlight(playerIndex) {
                const tableau = document.getElementById(`tableau-${playerIndex}`);
                if (!tableau) return;
                tableau.querySelectorAll('.affected-by-hover').forEach(el => el.classList.remove('affected-by-hover'));
